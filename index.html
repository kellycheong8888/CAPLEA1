<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📖 跟讀文章 · 葡語 A1-B1</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VB5QDP8LX9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-VB5QDP8LX9');

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0ece6;
            min-height: 100vh;
            padding: 24px;
            padding-top: 30px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 36px 32px 40px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #2d2a24; }
        .header .badge { background: #e8e4de; padding: 8px 22px; border-radius: 30px; font-size: 14px; font-weight: 500; color: #3d352c; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e8e4de; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-bar button { border: none; background: transparent; padding: 10px 22px; border-radius: 30px; font-size: 15px; font-weight: 600; color: #5f5346; cursor: pointer; transition: 0.2s; }
        .tab-bar button:hover { background: #f0ece6; }
        .tab-bar button.active { background: #2d2a24; color: #ffffff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 22px;
            background: #f5f2ed;
            border-radius: 24px;
            align-items: center;
        }
        .controls label { font-size: 14px; font-weight: 500; color: #5f5346; }
        .controls select { flex: 1; min-width: 180px; background: #ffffff; border: none; border-radius: 30px; padding: 8px 16px; font-size: 13px; color: #2d2a24; outline: none; cursor: pointer; }
        .controls .voice-status { font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 30px; }
        .controls .voice-status.fixed { color: #1e7b4a; background: #e6f5ed; }
        .controls .voice-status.not-fixed { color: #b13e3e; background: #f5e6e6; }
        .controls .speed-group { display: flex; align-items: center; gap: 10px; }
        .controls .speed-group input[type="range"] { width: 110px; accent-color: #8f7a66; cursor: pointer; }
        .controls .speed-group .speed-val { font-size: 15px; font-weight: 600; color: #2d2a24; min-width: 40px; text-align: center; }
        .controls .readtone-hint { font-size: 12px; color: #7a8a9a; background: #eef4fa; padding: 4px 14px; border-radius: 30px; white-space: nowrap; }

        .top-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
        .top-actions button { border: none; border-radius: 40px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 6px; }
        .top-actions button:active { transform: scale(0.95); }
        .btn-toggle { background: #2d2a24; color: #ffffff; }
        .btn-toggle:hover { background: #1f1b16; }
        .btn-toggle.unmask { background: #2d7a4a; }
        .btn-toggle.unmask:hover { background: #1f5f3a; }
        .btn-show-all { background: #e8e4de; color: #5f5346; }
        .btn-show-all:hover { background: #d5cfc7; }
        .btn-hide-all { background: #e8e4de; color: #5f5346; }
        .btn-hide-all:hover { background: #d5cfc7; }

        .category-tabs { display: flex; gap: 12px; margin-bottom: 20px; padding: 4px; }
        .category-tabs button { flex: 1; border: 2px solid #d0d8e0; border-radius: 40px; padding: 12px 18px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; background: #f5f7fa; color: #4a5a6a; }
        .category-tabs button:hover { background: #e8edf2; }
        .category-tabs button.active-a1 { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; }
        .category-tabs button.active-a2 { background: #d1fae5; border-color: #059669; color: #047857; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 16px 0 20px; flex-wrap: wrap; }
        .pagination button { border: 1px solid #d0d8e0; border-radius: 30px; padding: 6px 16px; background: transparent; font-size: 14px; font-weight: 600; color: #4a5a6a; cursor: pointer; transition: 0.15s; }
        .pagination button:hover { background: #e8edf2; }
        .pagination button.active-page { background: #2d2a24; color: #ffffff; border-color: #2d2a24; }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination .page-info { font-size: 14px; color: #6b7a8a; padding: 0 8px; }

        .article-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 48px; }
        .article-tabs button { flex: 0 0 calc(20% - 8px); min-width: 0; padding: 10px 6px; border: 2px solid #e0d8cf; border-radius: 40px; background: transparent; font-size: 13px; font-weight: 600; color: #5f5346; cursor: pointer; transition: 0.15s; text-align: center; line-height: 1.3; word-break: break-word; white-space: normal; }
        .article-tabs button:active { transform: scale(0.96); }
        .article-tabs button.active { background: #2d2a24; color: #ffffff; border-color: #2d2a24; }
        .article-tabs button .icon { font-size: 14px; }
        .article-tabs button .zh-label { display: block; font-size: 10px; font-weight: 400; color: #8a7e72; margin-top: 2px; }
        .article-tabs button.active .zh-label { color: #c5b8a8; }

        .play-controls { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
        .play-controls button { border: none; border-radius: 50px; padding: 16px 32px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.15s; flex: 1; min-width: 100px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .play-controls button:active { transform: scale(0.95); }
        .btn-play { background: #2d2a24; color: #ffffff; }
        .btn-play:active { background: #1f1b16; }
        .btn-play.playing { background: #b15e4a; }
        .btn-pause { background: #e8e4de; color: #5f5346; }
        .btn-pause:active { background: #d5cfc7; }
        .btn-pause:disabled { opacity: 0.4; pointer-events: none; }
        .btn-resume { background: #2d7a4a; color: #ffffff; }
        .btn-resume:active { background: #1f5f3a; }
        .btn-resume:disabled { opacity: 0.4; pointer-events: none; }

        .progress-wrap { background: #ede8e2; border-radius: 30px; height: 8px; margin-bottom: 18px; overflow: hidden; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: #8f7a66; border-radius: 30px; transition: width 0.2s; }

        .article-content {
            background: #fcf9f6;
            border-radius: 28px;
            padding: 28px 24px;
            border: 1px solid #f0ebe5;
            min-height: 380px;
            max-height: 540px;
            overflow-y: auto;
            line-height: 2;
            font-size: 18px;
            color: #1f1b16;
        }
        .article-content::-webkit-scrollbar { width: 6px; }
        .article-content::-webkit-scrollbar-track { background: #f0ece6; border-radius: 10px; }
        .article-content::-webkit-scrollbar-thumb { background: #c5b8a8; border-radius: 10px; }

        .sentence {
            margin-bottom: 3px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .sentence:hover { background: #eef4fa; }
        .sentence.highlight { background: #faf0e0; padding: 8px 16px; border-left: 4px solid #b3a394; }
        .sentence .label { font-size: 12px; color: #b3a394; font-weight: 600; margin-right: 4px; }
        .sentence .text { color: #1f1b16; cursor: pointer; flex: 1; font-size: 18px; min-width: 60px; }
        .sentence .text.zh-text { color: #5f5346; cursor: default; }
        .sentence .text.pt-text { cursor: pointer; transition: 0.2s; padding: 2px 4px; border-radius: 4px; }
        .sentence .text.pt-text:hover { text-decoration: underline; color: #1a3a5c; }
        .sentence .text.pt-text.masked { background: #2d2a24; color: #2d2a24 !important; border-radius: 4px; padding: 2px 8px; cursor: pointer; user-select: none; transition: 0.15s; text-decoration: none !important; }
        .sentence .text.pt-text.masked:hover { background: #4a4440; }

        .sentence-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
            width: 100%;
            padding-left: 28px;
        }
        .sentence-actions button {
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sentence-actions button:active { transform: scale(0.95); }
        .btn-play-icon { background: #e1ecf5; color: #003753; }
        .btn-play-icon:hover { background: #cde0ef; }
        .btn-record { background: #fce7f3; color: #9d174d; }
        .btn-record:hover { background: #fbcfe8; }
        .btn-record.recording { background: #b14a4a; color: white; animation: blink 0.8s infinite; }
        .btn-playback { background: #e0e7ff; color: #3730a3; }
        .btn-playback:hover { background: #c7d2fe; }
        .btn-playback:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-score { background: #fef3c7; color: #b45309; }
        .btn-score:hover { background: #fde68a; }
        .btn-score:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .score-result {
            margin-top: 6px;
            padding: 8px 16px;
            border-radius: 12px;
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            display: none;
            font-size: 14px;
            line-height: 1.8;
            width: 100%;
        }
        .score-result.show { display: block; }
        .score-result .score-number { font-size: 20px; font-weight: 700; color: #16a34a; }
        .score-result .score-feedback { color: #374151; margin-top: 4px; }
        .score-result .score-feedback .correct { color: #16a34a; }
        .score-result .score-feedback .improve { color: #dc2626; }
        .score-result .score-demo { margin-top: 6px; padding: 6px 12px; background: #eef2ff; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .record-status { font-size: 11px; color: #8f7a66; margin-left: 4px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 12px 18px;
            background: #f5f2ed;
            border-radius: 30px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-text { font-size: 14px; color: #5f5346; flex: 1; }
        .status-position { font-size: 13px; color: #8f7a66; font-weight: 500; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2a24;
            color: #f5f1eb;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .toast.show { opacity: 1; }

        .history-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .history-stats .stat-card { background: #f5f7fa; padding: 14px 16px; border-radius: 16px; text-align: center; }
        .history-stats .stat-card .stat-number { font-size: 24px; font-weight: 700; color: #2d2a24; }
        .history-stats .stat-card .stat-label { font-size: 12px; color: #6b7a8a; }
        .history-list { max-height: 350px; overflow-y: auto; }
        .history-list .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #e8e4de; font-size: 14px; flex-wrap: wrap; gap: 6px; }
        .history-list .history-item .h-date { color: #6b7a8a; font-size: 12px; }
        .history-list .history-item .h-score { font-weight: 700; color: #16a34a; }
        .history-list .history-item .h-type { background: #e8e4de; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .history-list .history-item .h-view { color: #2563eb; cursor: pointer; font-weight: 600; font-size: 12px; }
        .history-list .history-item .h-view:hover { text-decoration: underline; }
        .history-clear-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; margin-top: 12px; }
        .history-clear-btn:hover { background: #b91c1c; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .app { padding: 20px 16px 28px; border-radius: 32px; }
            .header h1 { font-size: 22px; }
            .controls { padding: 14px 16px; gap: 10px; }
            .controls select { min-width: 120px; font-size: 12px; }
            .controls .speed-group input[type="range"] { width: 80px; }
            .controls .readtone-hint { font-size: 10px; padding: 2px 10px; white-space: normal; }
            .category-tabs button { font-size: 14px; padding: 10px 12px; }
            .article-tabs button { flex: 0 0 calc(33.33% - 6px); font-size: 12px; padding: 8px 4px; }
            .article-content { font-size: 16px; padding: 18px 14px; max-height: 400px; }
            .play-controls button { font-size: 15px; padding: 14px 18px; min-width: 70px; }
            .status-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
            .top-actions button { font-size: 13px; padding: 8px 14px; }
            .sentence { padding: 4px 8px; gap: 4px; }
            .sentence .text { font-size: 16px; }
            .sentence-actions { padding-left: 8px; }
            .sentence-actions button { font-size: 11px; padding: 3px 10px; }
            .tab-bar button { font-size: 13px; padding: 8px 14px; }
            .history-stats { grid-template-columns: repeat(2, 1fr); }
            .pagination button { font-size: 12px; padding: 4px 12px; }
            .pagination .page-info { font-size: 12px; }
        }
        @media (max-width: 480px) {
            .article-tabs button { flex: 0 0 calc(50% - 5px); font-size: 11px; padding: 6px 4px; }
            .play-controls button { font-size: 13px; padding: 12px 12px; min-width: 60px; }
            .sentence .text { font-size: 15px; }
            .category-tabs { flex-direction: column; gap: 6px; }
            .category-tabs button { font-size: 13px; padding: 8px 12px; }
            .tab-bar { gap: 4px; }
            .tab-bar button { font-size: 12px; padding: 6px 10px; }
            .history-stats { grid-template-columns: 1fr 1fr; }
            .pagination button { font-size: 11px; padding: 3px 10px; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>📖 葡語學習</h1>
            <span class="badge" id="totalBadge">70 篇文章</span>
        </div>

        <div class="controls">
            <label>🎙️ 語音</label>
            <select id="voiceSelect">
                <option value="pt-PT-FernandaNeural">🇵🇹 Fernanda (女聲) - 標準</option>
                <option value="pt-PT-RaquelNeural">🇵🇹 Raquel (女聲) - 自然</option>
                <option value="pt-PT-DuarteNeural">🇵🇹 Duarte (男聲) - 沈穩</option>
                <option value="pt-BR-FranciscaNeural">🇧🇷 Francisca (女聲) - 巴西</option>
                <option value="pt-BR-AntonioNeural">🇧🇷 Antonio (男聲) - 巴西</option>
                <option value="browser">🌐 瀏覽器語音 (備用)</option>
            </select>
            <span class="voice-status fixed" id="voiceStatus">✅ Azure: pt-PT-FernandaNeural</span>
            <div class="speed-group">
                <label>🐢</label>
                <input type="range" id="speedSlider" min="0.4" max="1.8" step="0.05" value="0.85">
                <span class="speed-val" id="speedDisplay">0.85</span>
                <label>🐇</label>
            </div>
            <span class="readtone-hint">💡 選擇不同語音，聽聽看哪個最適合</span>
        </div>

        <div class="tab-bar" id="tabBar">
            <button class="active" data-tab="reading">📖 跟讀文章</button>
            <button data-tab="history">📊 練習記錄</button>
        </div>

        <div class="tab-content active" id="tabReading">
            <div class="top-actions">
                <button class="btn-toggle" id="toggleMaskBtn">🔒 遮擋葡語</button>
                <button class="btn-show-all" id="showAllBtn">🔓 全部顯示</button>
                <button class="btn-hide-all" id="hideAllBtn">🔒 全部遮擋</button>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="active-a1" data-category="a1">📘 A1-A2 看圖說話（50篇）</button>
                <button data-category="a2">📗 A2-B1 看圖說話（20篇）</button>
            </div>

            <div class="pagination" id="pagination"></div>
            <div class="article-tabs" id="articleTabs"></div>

            <div class="play-controls">
                <button class="btn-play" id="playBtn">▶️ 播放全部</button>
                <button class="btn-pause" id="pauseBtn" disabled>⏸️ 暫停</button>
                <button class="btn-resume" id="resumeBtn" disabled>▶️ 繼續</button>
            </div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="article-content" id="articleContent">
                <div style="text-align:center;padding:60px 20px;color:#8f7a66;font-size:18px;">⏳ 載入中...</div>
            </div>
        </div>

        <div class="tab-content" id="tabHistory">
            <div id="historyContainer">
                <div class="history-stats" id="historyStats">
                    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">總練習次數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statAvg">-</div><div class="stat-label">平均分數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statHigh">-</div><div class="stat-label">最高分</div></div>
                    <div class="stat-card"><div class="stat-number" id="statLow">-</div><div class="stat-label">最低分</div></div>
                </div>
                <div class="history-list" id="historyList">
                    <div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>
                </div>
                <button class="history-clear-btn" id="clearHistoryBtn">🗑️ 清除所有記錄</button>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-text" id="statusText">🔊 點擊葡語句子播放，或按「播放全部」</span>
            <span class="status-position" id="statusPosition">句子 0 / 0</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ================================================================
    // 1. 文章數據 (精簡範例，實際運作時包含你的完整數據)
    // ================================================================

                { text: '浴室雖小，但非常乾淨整潔。', type: 'zh' }
            ]
        },
        {
            id: 'a1_2',
            title: 'Cozinha',
            titleZh: '廚房',
            icon: '🍳',
            sentences: [
                { text: 'Nesta imagem, vejo uma cozinha moderna e bem equipada.', type: 'pt' },
                { text: '在這張圖片裡，我看到一間現代且設備齊全的廚房。', type: 'zh' },
                { text: 'O fogão e o forno estão ao lado da janela.', type: 'pt' },

                { text: 'O frigorífico está ao lado da porta.', type: 'pt' },

    // ================================================================
    // 2. 核心變數 & 手機相容音訊引擎

    // 🎯 雙重機制音訊控制器
    const AudioEngine = {
        audioCtx: null,
        mediaStream: null,
        recorder: null, 
        recordedChunks: [],
        recordedBlob: null,
        recordingTimer: null,
        recordedDuration: 0,
        scriptNode: null, 
        audioBuffers: [], // 用於 AudioContext 錄音時暫存 PCM 數據

        // 用戶手勢觸發第一時間解鎖 AudioContext
        initContext() {
            if (!this.audioCtx) {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            }
            if (this.audioCtx.state === 'suspended') {
                this.audioCtx.resume();
            }
        },

        // 偵測 iOS 設備
        isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        },

        // 獲取相容的 MediaRecorder 格式
        getSupportedMimeType() {
            const types = ["audio/webm;codecs=opus", "audio/mp4", "audio/aac", "audio/ogg", "audio/wav"];
            for (let t of types) {
                if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) {
                    return t;
                }
            }
            return "";
        },

        // 🛠️ 啟動錄音
        async startRecording() {
            this.initContext();
            this.recordedChunks = [];
            this.audioBuffers = [];
            this.recordedBlob = null;
            this.recordedDuration = 0;

            const constraints = {
                audio: {
                    channelCount: 1,
                    sampleRate: 16000,
                    echoCancellation: true,
                    noiseSuppression: true
                }
            };

            try {
                this.mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                console.error("無法取得麥克風權限:", err);
                throw new Error("MuteError");
            }

            const mimeType = this.getSupportedMimeType();

            // 優先嘗試 MediaRecorder 機制
            if (typeof MediaRecorder !== 'undefined' && mimeType !== "" && !this.isIOS()) {
                try {
                    this.recorder = new MediaRecorder(this.mediaStream, { mimeType });
                    this.recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) this.recordedChunks.push(e.data);
                    };
                    this.recorder.onstop = () => {
                        this.recordedBlob = new Blob(this.recordedChunks, { type: mimeType });
                    };
                    this.recorder.start(10);
                } catch (e) {
                    console.warn("MediaRecorder 啟動失敗，將降級使用 AudioContext:", e);
                    this.startAudioContextRecording();
                }
            } else {
                // iOS 或不支援 MediaRecorder 時，啟動 AudioContext 純手動錄音
                this.startAudioContextRecording();
            }

            // 計時器：檢查錄音時長
            const startTime = Date.now();
            this.recordingTimer = setInterval(() => {
                this.recordedDuration = (Date.now() - startTime) / 1000;
            }, 100);
        },

        // 降級方案：使用 AudioContext + ScriptProcessorNode 手動錄音
        startAudioContextRecording() {
            try {
                const source = this.audioCtx.createMediaStreamSource(this.mediaStream);
                // 使用 4096 緩衝大小，1 個輸入頻道，1 個輸出頻道
                this.scriptNode = this.audioCtx.createScriptProcessor(4096, 1, 1);
                
                this.scriptNode.onaudioprocess = (e) => {
                    if (!this.mediaStream) return;
                    const inputBuffer = e.inputBuffer.getChannelData(0);
                    // 複製一份 PCM Float32 資料
                    this.audioBuffers.push(new Float32Array(inputBuffer));
                };

                source.connect(this.scriptNode);
                this.scriptNode.connect(this.audioCtx.destination);
            } catch (err) {
                console.error("AudioContext 錄音鏈接失敗:", err);
                throw err;
            }
        },

        // 🛠️ 停止錄音並回傳 Blob (如果是 AudioContext 模式會自動壓成標準 WAV)
        async stopRecording() {
            if (this.recordingTimer) {
                clearInterval(this.recordingTimer);
                this.recordingTimer = null;
            }

            // 關閉並釋放麥克風實體（安全防禦：防止頂部錄音紅綠燈不滅）
            if (this.mediaStream) {
                this.mediaStream.getTracks().forEach(track => track.stop());
                this.mediaStream = null;
            }

            // 如果是標準 MediaRecorder
            if (this.recorder && this.recorder.state !== 'inactive') {
                return new Promise((resolve) => {
                    this.recorder.onstop = () => {
                        const mimeType = this.getSupportedMimeType();
                        this.recordedBlob = new Blob(this.recordedChunks, { type: mimeType });
                        this.recorder = null;
                        resolve({ blob: this.recordedBlob, duration: this.recordedDuration });
                    };
                    this.recorder.stop();
                });
            } 
            // 如果是降級的 AudioContext
            else if (this.scriptNode) {
                this.scriptNode.disconnect();
                this.scriptNode = null;

                // 將收集到的所有 PCM 片段合併
                const mergedBuffer = this.mergeBuffers(this.audioBuffers);
                // 將 16kHz PCM 資料編碼為標準 WAV 檔案
                const wavBuffer = this.encodeWAV(mergedBuffer, 16000);
                this.recordedBlob = new Blob([wavBuffer], { type: 'audio/wav' });
                
                return { blob: this.recordedBlob, duration: this.recordedDuration };
            }

            return { blob: null, duration: 0 };
        },

        // 合併緩衝區
        mergeBuffers(buffers) {
            let totalLength = 0;
            for (let i = 0; i < buffers.length; i++) {
                totalLength += buffers[i].length;
            }
            const result = new Float32Array(totalLength);
            let offset = 0;
            for (let i = 0; i < buffers.length; i++) {
                result.set(buffers[i], offset);
                offset += buffers[i].length;
            }
            return result;
        },

        // 🎨 手動 WAV 16bit 單聲道編碼器
        encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            /* RIFF identifier */
            this.writeString(view, 0, 'RIFF');
            /* file length */
            view.setUint32(4, 36 + samples.length * 2, true);
            /* RIFF type */
            this.writeString(view, 8, 'WAVE');
            /* format chunk identifier */
            this.writeString(view, 12, 'fmt ');
            /* format chunk length */
            view.setUint32(16, 16, true);
            /* sample format (raw) */
            view.setUint16(20, 1, true);
            /* channel count */
            view.setUint16(22, 1, true);
            /* sample rate */
            view.setUint32(24, sampleRate, true);
            /* byte rate (sample rate * block align) */
            view.setUint32(28, sampleRate * 2, true);
            /* block align (channel count * bytes per sample) */
            view.setUint16(32, 2, true);
            /* bits per sample */
            view.setUint16(34, 16, true);
            /* data chunk identifier */
            this.writeString(view, 36, 'data');
            /* data chunk length */
            view.setUint32(40, samples.length * 2, true);

            // 寫入 PCM 音訊數據
            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return buffer;
        },

        writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
    };

    const STORAGE_KEY = 'PT_READ_HISTORY_LOGS';

    // ================================================================

    document.addEventListener("DOMContentLoaded", () => {

    function initApp() {
        // 分類切換
        document.getElementById("categoryTabs").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            document.querySelectorAll("#categoryTabs button").forEach(b => {
                b.className = "";
            });
            const cat = btn.dataset.category;
            currentCategory = cat;

                btn.className = "active-a1";
                articlesData = ARTICLES_A1;
                document.getElementById("totalBadge").innerText = ARTICLES_A1.length + " 篇文章";
            } else {
                btn.className = "active-a2";
                articlesData = ARTICLES_A2;
                document.getElementById("totalBadge").innerText = ARTICLES_A2.length + " 篇文章";
            }
            currentPage = 1;
            currentArticleIndex = 0;
            renderArticleList();
        });

        // 選單頁籤
        document.getElementById("tabBar").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            document.querySelectorAll("#tabBar button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const tab = btn.dataset.tab;
            if (tab === 'reading') {
                document.getElementById("tabReading").classList.add("active");
                document.getElementById("tabHistory").classList.remove("active");
            } else {
                document.getElementById("tabReading").classList.remove("active");
                document.getElementById("tabHistory").classList.add("active");
                updateHistoryUI();
            }
        });

        // 語速控制
        const speedSlider = document.getElementById("speedSlider");
        const speedDisplay = document.getElementById("speedDisplay");
        speedSlider.addEventListener("input", (e) => {
            speedDisplay.innerText = e.target.value;
        });

        // 遮擋控制
        document.getElementById("toggleMaskBtn").addEventListener("click", () => {
            isMasked = !isMasked;
            const btn = document.getElementById("toggleMaskBtn");
            if (isMasked) {
                btn.innerText = "🔓 顯示葡語";
                btn.classList.add("unmask");
                document.querySelectorAll(".text.pt-text").forEach(t => t.classList.add("masked"));
            } else {
                btn.innerText = "🔒 遮擋葡語";
                btn.classList.remove("unmask");
                document.querySelectorAll(".text.pt-text").forEach(t => t.classList.remove("masked"));
            }
        });

        document.getElementById("showAllBtn").addEventListener("click", () => {
            isMasked = false;
            document.getElementById("toggleMaskBtn").innerText = "🔒 遮擋葡語";
            document.getElementById("toggleMaskBtn").classList.remove("unmask");
            document.querySelectorAll(".text.pt-text").forEach(t => t.classList.remove("masked"));

        document.getElementById("hideAllBtn").addEventListener("click", () => {

                showToast("🗑️ 已清除所有歷史紀錄");

    // 顯示 Toast 訊息
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // 渲染分頁與文章列表
    function renderArticleList() {
        const tabsContainer = document.getElementById("articleTabs");
        tabsContainer.innerHTML = "";

        if (articlesData.length === 0) {
            tabsContainer.innerHTML = `<div style="text-align:center;width:100%;padding:20px;color:#8f7a66;">暫無文章</div>`;
            return;
        }

        articlesData.forEach((art, idx) => {
            const btn = document.createElement("button");
            if (idx === currentArticleIndex) btn.classList.add("active");
            btn.innerHTML = `
                <span class="icon">${art.icon || '📝'}</span>
                <span>${art.title}</span>
                <span class="zh-label">${art.titleZh}</span>
            `;
            btn.addEventListener("click", () => {
                AudioEngine.initContext(); // 📌 用戶觸發解鎖
                currentArticleIndex = idx;
                document.querySelectorAll("#articleTabs button").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderActiveArticle();
            });
            tabsContainer.appendChild(btn);
        });

        renderActiveArticle();
    }

    // 渲染當前選取文章內容
    function renderActiveArticle() {
        const art = articlesData[currentArticleIndex];
        const container = document.getElementById("articleContent");
        container.innerHTML = "";

        if (!art) return;

        let ptIndex = 1;
        art.sentences.forEach((s, sIdx) => {
            if (s.type === 'pt') {
                const div = document.createElement("div");
                div.className = "sentence";
                div.id = `s-wrap-${sIdx}`;
                div.dataset.index = sIdx;

                // 找到接下來的中文翻譯（若有）
                const nextS = art.sentences[sIdx + 1];
                const zhText = (nextS && nextS.type === 'zh') ? nextS.text : "";

                div.innerHTML = `
                    <span class="label">#${ptIndex++}</span>
                    <span class="text pt-text ${isMasked ? 'masked' : ''}" onclick="playSingleSentence('${s.text.replace(/'/g, "\\'")}', ${sIdx})">${s.text}</span>
                    <div class="sentence-actions">
                        <button class="btn-play-icon" onclick="playSingleSentence('${s.text.replace(/'/g, "\\'")}', ${sIdx})">🔊 播放</button>
                        <button class="btn-record" id="rec-btn-${sIdx}" onclick="toggleRecord(${sIdx})">🎙️ 錄音</button>
                        <button class="btn-playback" id="play-btn-${sIdx}" disabled onclick="playRecordedAudio(${sIdx})">🎧 播放錄音</button>
                        <button class="btn-score" id="score-btn-${sIdx}" disabled onclick="submitToAzureScore(${sIdx}, '${s.text.replace(/'/g, "\\'")}')">🏆 評分</button>
                        <span class="record-status" id="rec-status-${sIdx}"></span>
                    </div>
                    <div class="score-result" id="score-result-${sIdx}"></div>
                `;

                // 若有中文翻譯，渲染在下方
                if (zhText) {
                    const zhDiv = document.createElement("div");
                    zhDiv.className = "sentence";
                    zhDiv.style.marginTop = "-5px";
                    zhDiv.style.borderBottom = "1px dashed #e8e4de";
                    zhDiv.style.paddingBottom = "12px";
                    zhDiv.innerHTML = `
                        <span class="label" style="opacity:0;">#</span>
                        <span class="text zh-text">${zhText}</span>
                    `;
                    container.appendChild(div);
                    container.appendChild(zhDiv);
                } else {
                    container.appendChild(div);
                }
            }
        });

        // 重置播放狀態與進度條
        stopAllTTS();
        updateProgressBar(0);
        document.getElementById("statusPosition").innerText = `句子 0 / ${art.sentences.filter(s => s.type === 'pt').length}`;
    }

    // ================================================================
    // 5. 語音 TTS 播放模組（微軟 Azure TTS / 瀏覽器 Native 雙模適配）
    // ================================================================
    function stopAllTTS() {
        if (ttsAudio) {
            ttsAudio.pause();
            ttsAudio = null;
        }
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        document.querySelectorAll(".sentence").forEach(el => el.classList.remove("highlight"));
        document.getElementById("playBtn").className = "btn-play";
        document.getElementById("playBtn").innerText = "▶️ 播放全部";
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("resumeBtn").disabled = true;
    }

    // 播放單句
    async function playSingleSentence(text, sIdx) {
        AudioEngine.initContext(); // 📌 第一時間解鎖手機音訊
        stopAllTTS();

        const sentenceWrap = document.getElementById(`s-wrap-${sIdx}`);
        if (sentenceWrap) sentenceWrap.classList.add("highlight");

        const voiceName = document.getElementById("voiceSelect").value;
        const rate = document.getElementById("speedSlider").value;

        if (voiceName === "browser") {
            // 降級使用瀏覽器內置語音
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'pt-PT';
            u.rate = parseFloat(rate);
            u.onend = () => sentenceWrap && sentenceWrap.classList.remove("highlight");
            window.speechSynthesis.speak(u);
        } else {
            // 🏆 使用 Azure TTS (透過 Vercel 後端安全轉發)
            try {
                document.getElementById("statusText").innerText = "⚡ 正在生成高品質語音...";
                const response = await fetch(`/api/azure-tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, voiceName, rate })
                });

                if (!response.ok) throw new Error("TTS 生成失敗");

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                ttsAudio = new Audio(audioUrl);
                ttsAudio.play();
                ttsAudio.onended = () => {
                    if (sentenceWrap) sentenceWrap.classList.remove("highlight");
                    document.getElementById("statusText").innerText = "🔊 播放完畢";
                };
            } catch (err) {
                console.error(err);
                showToast("❌ 語音生成失敗，已自動降級至瀏覽器語音");
                // 失敗則降級本地
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'pt-PT';
                u.rate = parseFloat(rate);
                u.onend = () => sentenceWrap && sentenceWrap.classList.remove("highlight");
                window.speechSynthesis.speak(u);
            }
        }
    }

    // 播放整篇文章
    function playAllArticle() {
        const art = articlesData[currentArticleIndex];
        if (!art) return;

        stopAllTTS();
        currentPlaylist = art.sentences.filter(s => s.type === 'pt');
        currentPlayIndex = 0;

        if (currentPlaylist.length === 0) return;

        document.getElementById("playBtn").className = "btn-play playing";
        document.getElementById("playBtn").innerText = "🔊 正在播放...";
        document.getElementById("pauseBtn").disabled = false;
        document.getElementById("resumeBtn").disabled = true;

        playNextInList();
    }

    function playNextInList() {
        if (currentPlayIndex >= currentPlaylist.length) {
            stopAllTTS();
            updateProgressBar(100);
            document.getElementById("statusText").innerText = "🎉 整篇文章播放完成！";
            return;
        }

        const s = currentPlaylist[currentPlayIndex];
        // 尋找 HTML 節點進行標記高亮
        const allSentenceWraps = document.querySelectorAll(".sentence[data-index]");
        let targetWrap = null;
        allSentenceWraps.forEach(el => {
            const idx = parseInt(el.dataset.index);
            if (articlesData[currentArticleIndex].sentences[idx].text === s.text) {
                targetWrap = el;
            }
        });

        document.querySelectorAll(".sentence").forEach(el => el.classList.remove("highlight"));
        if (targetWrap) {
            targetWrap.classList.add("highlight");
            targetWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 更新進度條與狀態
        const percent = ((currentPlayIndex) / currentPlaylist.length) * 100;
        updateProgressBar(percent);
        document.getElementById("statusPosition").innerText = `句子 ${currentPlayIndex + 1} / ${currentPlaylist.length}`;
        document.getElementById("statusText").innerText = `🗣️ 正在播放：${s.text}`;

        const voiceName = document.getElementById("voiceSelect").value;
        const rate = document.getElementById("speedSlider").value;

        if (voiceName === "browser") {
            const u = new SpeechSynthesisUtterance(s.text);
            u.lang = 'pt-PT';
            u.rate = parseFloat(rate);
            u.onend = () => {
                currentPlayIndex++;
                playNextInList();
            };
            window.speechSynthesis.speak(u);
        } else {
            // Azure TTS (Vercel)
            fetch(`/api/azure-tts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: s.text, voiceName, rate })
            })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.blob();
            })
            .then(blob => {
                const audioUrl = URL.createObjectURL(blob);
                ttsAudio = new Audio(audioUrl);
                ttsAudio.play();
                ttsAudio.onended = () => {
                    currentPlayIndex++;
                    playNextInList();
                };
            })
            .catch(() => {
                // 失敗則原地使用本地 TTS 降級
                const u = new SpeechSynthesisUtterance(s.text);
                u.lang = 'pt-PT';
                u.rate = parseFloat(rate);
                u.onend = () => {
                    currentPlayIndex++;
                    playNextInList();
                };
                window.speechSynthesis.speak(u);
            });
        }
    }

    function pauseAllArticle() {
        if (ttsAudio) {
            ttsAudio.pause();
        }
        if (window.speechSynthesis) {
            window.speechSynthesis.pause();
        }
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("resumeBtn").disabled = false;
        document.getElementById("statusText").innerText = "⏸️ 播放已暫停";
    }

    function resumeAllArticle() {
        document.getElementById("pauseBtn").disabled = false;
        document.getElementById("resumeBtn").disabled = true;
        document.getElementById("statusText").innerText = "▶️ 繼續播放中...";

        const voiceName = document.getElementById("voiceSelect").value;
        if (voiceName === "browser") {
            if (window.speechSynthesis) {
                window.speechSynthesis.resume();
            }
        } else {
            if (ttsAudio) {
                ttsAudio.play();
            }
        }
    }

    function updateProgressBar(pct) {
        document.getElementById("progressBar").style.width = `${pct}%`;
    }

    // ================================================================
    // 6. 🎙️ 前端錄音控制核心（完美整合優化機制）
    // ================================================================
    let tempBlobs = {}; // 用於暫存每一句錄下來的音檔 Blob
    let activeRecordingIndex = -1; // 當前正在錄音的句子索引

    async function toggleRecord(sIdx) {
        AudioEngine.initContext(); // 📌 解鎖手機端音訊

        const recBtn = document.getElementById(`rec-btn-${sIdx}`);
        const statusSpan = document.getElementById(`rec-status-${sIdx}`);

        // 1. 如果「正在錄音」狀態：執行【停止錄音】
        if (activeRecordingIndex === sIdx) {
            recBtn.classList.remove("recording");
            recBtn.innerText = "🎙️ 錄音";
            statusSpan.innerText = "⏳ 正在處理錄音檔...";

            try {
                const { blob, duration } = await AudioEngine.stopRecording();
                activeRecordingIndex = -1;

                // 錄音安全與品質驗證（防空檔）
                if (!blob || blob.size < 4000) {
                    statusSpan.innerText = "❌ 錄音無效，請大聲重試";
                    showToast("⚠️ 沒錄到聲音，請允許麥克風權限再試一次！");
                    return;
                }

                tempBlobs[sIdx] = blob;
                statusSpan.innerText = `✅ 錄製成功 (${duration.toFixed(1)}s)`;
                
                // 開啟「播放錄音」和「評分」按鈕
                document.getElementById(`play-btn-${sIdx}`).disabled = false;
                document.getElementById(`score-btn-${sIdx}`).disabled = false;
            } catch (err) {
                console.error(err);
                statusSpan.innerText = "❌ 處理錄音出錯";
                activeRecordingIndex = -1;
            }
            return;
        }

        // 2. 如果目前有別的句子在錄音，先阻斷
        if (activeRecordingIndex !== -1) {
            showToast("⚠️ 請先停止目前正在進行的錄音哦！");
            return;
        }

        // 3. 執行【開始錄音】
        stopAllTTS(); // 停止喇叭播音，避免回授雜音
        recBtn.classList.add("recording");
        recBtn.innerText = "🛑 停止";
        statusSpan.innerText = "🔴 錄音中...";
        activeRecordingIndex = sIdx;

        try {
            await AudioEngine.startRecording();
        } catch (err) {
            recBtn.classList.remove("recording");
            recBtn.innerText = "🎙️ 錄音";
            activeRecordingIndex = -1;

            if (err.message === "MuteError") {
                statusSpan.innerText = "❌ 拒絕麥克風權限";
                alert("手機瀏覽器需要麥克風權限才可以錄音評分喔！請前往手機系統設定為瀏覽器開啟權限。");
            } else {
                statusSpan.innerText = "❌ 無法啟動錄音";
                showToast("❌ 啟動錄音失敗");
            }
        }
    }

    // 播放用戶剛剛錄好的聲音
    function playRecordedAudio(sIdx) {
        AudioEngine.initContext(); // 📌 解鎖
        const blob = tempBlobs[sIdx];
        if (!blob) return;

        const url = URL.createObjectURL(blob);
        const player = new Audio(url);
        player.play();
        showToast("🎧 正在播放您的錄音...");
    }

    // ================================================================
    // 7. 🏆 Azure 語音評分與 Vercel API 對接
    // ================================================================
    async function submitToAzureScore(sIdx, referenceText) {
        const blob = tempBlobs[sIdx];
        if (!blob) {
            showToast("❌ 找不到您的錄音檔，請重新錄音");
            return;
        }

        const scoreBtn = document.getElementById(`score-btn-${sIdx}`);
        const resultDiv = document.getElementById(`score-result-${sIdx}`);
        const statusSpan = document.getElementById(`rec-status-${sIdx}`);

        scoreBtn.disabled = true;
        scoreBtn.innerText = "⚡ 評分中...";
        resultDiv.className = "score-result";
        resultDiv.style.display = "none";
        statusSpan.innerText = "🏆 正在上傳至 Azure 分析中...";

        // 打包錄音 Blob 上傳至 Vercel 路由
        const formData = new FormData();
        formData.append("audio", blob, "user_pronunciation.wav");
        formData.append("referenceText", referenceText);

        try {
            const response = await fetch(`/api/azure-eval`, {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("伺服器評分接口回報錯誤");

            const data = await response.json();
            
            // 繪製微軟 Azure Pronunciation Assessment 回傳結果
            scoreBtn.innerText = "🏆 評分";
            scoreBtn.disabled = false;
            statusSpan.innerText = "✅ 評分完成";

            const accuracy = Math.round(data.accuracyScore || 0);
            const fluency = Math.round(data.fluencyScore || 0);
            const pronunciation = Math.round(data.pronScore || 0);
            const compliancy = Math.round(data.completenessScore || 0);

            let feedbackHTML = `
                <div>🔊 辨識文字：<strong>"${data.recognizedText || '無法識別'}"</strong></div>
                <div style="margin-top:4px; display:flex; gap:12px; flex-wrap:wrap;">
                    <span>準確度：<b class="${accuracy >= 80 ? 'correct' : 'improve'}">${accuracy}%</b></span>
                    <span>流暢度：<b>${fluency}%</b></span>
                    <span>完整度：<b>${compliancy}%</b></span>
                </div>
            `;

            // 如果有單詞級別的詳細發音錯誤反饋，可以繼續在下方顯示
            if (data.words && data.words.length > 0) {
                feedbackHTML += `<div style="margin-top:6px; font-size:12px; line-height:1.4;">`;
                data.words.forEach(w => {
                    const err = w.errorType;
                    if (err === "None") {
                        feedbackHTML += `<span style="color:#16a34a; margin-right:6px;">${w.word}</span>`;
                    } else if (err === "Mispronunciation") {
                        feedbackHTML += `<span style="color:#dc2626; text-decoration:line-through; margin-right:6px;" title="發音不準">${w.word}</span>`;
                    } else if (err === "Omission") {
                        feedbackHTML += `<span style="color:#eab308; margin-right:6px;" title="漏讀">${w.word}</span>`;
                    } else {
                        feedbackHTML += `<span style="color:#6b7a8a; margin-right:6px;">${w.word}</span>`;
                    }
                });
                feedbackHTML += `</div>`;
            }

            resultDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="score-number">總分：${pronunciation} 分</span>
                    <span>${pronunciation >= 85 ? '🌟 完美發音！' : pronunciation >= 70 ? '👍 表現很好！' : '💪 繼續加油！'}</span>
                </div>
                <div class="score-feedback">${feedbackHTML}</div>
            `;
            resultDiv.classList.add("show");
            resultDiv.style.display = "block";

            // 存入本地歷史紀錄
            saveToHistoryLog(referenceText, pronunciation);

        } catch (err) {
            console.error(err);
            scoreBtn.innerText = "🏆 評分";
            scoreBtn.disabled = false;
            statusSpan.innerText = "❌ 評分連線失敗";
            showToast("❌ 評分失敗，請確認 Vercel 後端 API 是否設置正確");
        }
    }

    // ================================================================
    // 8. 練習記錄本地存檔與 UI 刷新
    // ================================================================
    function saveToHistoryLog(sentence, score) {
        const history = getHistory();
        const art = articlesData[currentArticleIndex];
        const newRecord = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            articleTitle: art.title,
            sentence: sentence,
            score: score,
            category: currentCategory.toUpperCase()
        };
        history.unshift(newRecord); // 最新放在最前面
        saveHistory(history);
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const history = getHistory();
        const total = history.length;

        // 計算統計卡片
        document.getElementById("statTotal").innerText = total;

        if (total === 0) {
            document.getElementById("statAvg").innerText = "-";
            document.getElementById("statHigh").innerText = "-";
            document.getElementById("statLow").innerText = "-";
            document.getElementById("historyList").innerHTML = `
                <div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>
            `;
            return;
        }

        const scores = history.map(h => h.score);
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / total);
        const high = Math.max(...scores);
        const low = Math.min(...scores);

        document.getElementById("statAvg").innerText = avg;
        document.getElementById("statHigh").innerText = high;
        document.getElementById("statLow").innerText = low;

        // 渲染列表
        const listContainer = document.getElementById("historyList");
        listContainer.innerHTML = "";
        
        history.forEach(h => {
            const item = document.createElement("div");
            item.className = "history-item";
            item.innerHTML = `
                <div>
                    <strong>[${h.category}] ${h.articleTitle}</strong>
                    <div style="color:#5f5346; font-size:13px; margin-top:2px;">${h.sentence}</div>
                    <span class="h-date">${h.date}</span>
                </div>
                <div style="text-align:right;">
                    <span class="h-score">${h.score} 分</span>
                </div>
            `;
            listContainer.appendChild(item);
        });
    }
    </script>
