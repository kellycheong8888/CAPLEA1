<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📖 葡語學習 · A1-C1</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VB5QDP8LX9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-VB5QDP8LX9');
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0ece6;
            min-height: 100vh;
            padding: 24px;
            padding-top: 30px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 36px 32px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2d2a24;
        }
        .header .badge {
            background: #e8e4de;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #3d352c;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e8e4de;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .tab-bar button {
            border: none;
            background: transparent;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            color: #5f5346;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-bar button:hover { background: #f0ece6; }
        .tab-bar button.active { background: #2d2a24; color: #ffffff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 22px;
            background: #f5f2ed;
            border-radius: 24px;
            align-items: center;
        }
        .controls label { font-size: 14px; font-weight: 500; color: #5f5346; }
        .controls select {
            flex: 1;
            min-width: 180px;
            background: #ffffff;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            color: #2d2a24;
            outline: none;
            cursor: pointer;
        }
        .controls .voice-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .controls .voice-status.fixed { color: #1e7b4a; background: #e6f5ed; }
        .controls .voice-status.not-fixed { color: #b13e3e; background: #f5e6e6; }
        .controls .speed-group { display: flex; align-items: center; gap: 10px; }
        .controls .speed-group input[type="range"] { width: 110px; accent-color: #8f7a66; cursor: pointer; }
        .controls .speed-group .speed-val { font-size: 15px; font-weight: 600; color: #2d2a24; min-width: 40px; text-align: center; }
        .controls .readtone-hint { font-size: 12px; color: #7a8a9a; background: #eef4fa; padding: 4px 14px; border-radius: 30px; white-space: nowrap; }

        .top-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
        .top-actions button {
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-actions button:active { transform: scale(0.95); }
        .btn-toggle { background: #2d2a24; color: #ffffff; }
        .btn-toggle:hover { background: #1f1b16; }
        .btn-toggle.unmask { background: #2d7a4a; }
        .btn-toggle.unmask:hover { background: #1f5f3a; }
        .btn-show-all { background: #e8e4de; color: #5f5346; }
        .btn-show-all:hover { background: #d5cfc7; }
        .btn-hide-all { background: #e8e4de; color: #5f5346; }
        .btn-hide-all:hover { background: #d5cfc7; }

        .category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 4px;
        }
        .category-tabs button {
            flex: 1;
            border: 2px solid #d0d8e0;
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: #f5f7fa;
            color: #4a5a6a;
        }
        .category-tabs button:hover { background: #e8edf2; }
        .category-tabs button.active-a1 { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; }
        .category-tabs button.active-a2 { background: #d1fae5; border-color: #059669; color: #047857; }

        .article-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            min-height: 48px;
        }
        .article-tabs button {
            flex: 0 0 calc(20% - 8px);
            min-width: 0;
            padding: 10px 6px;
            border: 2px solid #e0d8cf;
            border-radius: 40px;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #5f5346;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
            white-space: normal;
        }
        .article-tabs button:active { transform: scale(0.96); }
        .article-tabs button.active { background: #2d2a24; color: #ffffff; border-color: #2d2a24; }
        .article-tabs button .icon { font-size: 14px; }
        .article-tabs button .zh-label { display: block; font-size: 10px; font-weight: 400; color: #8a7e72; margin-top: 2px; }
        .article-tabs button.active .zh-label { color: #c5b8a8; }

        .play-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .play-controls button {
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .play-controls button:active { transform: scale(0.95); }
        .btn-play { background: #2d2a24; color: #ffffff; }
        .btn-play:active { background: #1f1b16; }
        .btn-play.playing { background: #b15e4a; }
        .btn-pause { background: #e8e4de; color: #5f5346; }
        .btn-pause:active { background: #d5cfc7; }
        .btn-pause:disabled { opacity: 0.4; pointer-events: none; }
        .btn-resume { background: #2d7a4a; color: #ffffff; }
        .btn-resume:active { background: #1f5f3a; }
        .btn-resume:disabled { opacity: 0.4; pointer-events: none; }

        .progress-wrap {
            background: #ede8e2;
            border-radius: 30px;
            height: 8px;
            margin-bottom: 18px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .progress-bar { height: 100%; width: 0%; background: #8f7a66; border-radius: 30px; transition: width 0.2s; }

        .article-content {
            background: #fcf9f6;
            border-radius: 28px;
            padding: 28px 24px;
            border: 1px solid #f0ebe5;
            min-height: 380px;
            max-height: 540px;
            overflow-y: auto;
            line-height: 2;
            font-size: 18px;
            color: #1f1b16;
        }
        .article-content::-webkit-scrollbar { width: 6px; }
        .article-content::-webkit-scrollbar-track { background: #f0ece6; border-radius: 10px; }
        .article-content::-webkit-scrollbar-thumb { background: #c5b8a8; border-radius: 10px; }

        .sentence {
            margin-bottom: 3px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .sentence:hover { background: #eef4fa; }
        .sentence.highlight { background: #faf0e0; padding: 8px 16px; border-left: 4px solid #b3a394; }
        .sentence .label { font-size: 12px; color: #b3a394; font-weight: 600; margin-right: 4px; }
        .sentence .text { color: #1f1b16; cursor: pointer; flex: 1; font-size: 18px; min-width: 60px; }
        .sentence .text.zh-text { color: #5f5346; cursor: default; }
        .sentence .text.pt-text { cursor: pointer; transition: 0.2s; padding: 2px 4px; border-radius: 4px; }
        .sentence .text.pt-text:hover { text-decoration: underline; color: #1a3a5c; }
        .sentence .text.pt-text.masked { background: #2d2a24; color: #2d2a24 !important; border-radius: 4px; padding: 2px 8px; cursor: pointer; user-select: none; transition: 0.15s; text-decoration: none !important; }
        .sentence .text.pt-text.masked:hover { background: #4a4440; }

        .sentence-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
            width: 100%;
            padding-left: 28px;
        }
        .sentence-actions button {
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sentence-actions button:active { transform: scale(0.95); }
        .btn-play-icon { background: #e1ecf5; color: #003753; }
        .btn-play-icon:hover { background: #cde0ef; }
        .btn-record { background: #fce7f3; color: #9d174d; }
        .btn-record:hover { background: #fbcfe8; }
        .btn-record.recording { background: #b14a4a; color: white; animation: blink 0.8s infinite; }
        .btn-playback { background: #e0e7ff; color: #3730a3; }
        .btn-playback:hover { background: #c7d2fe; }
        .btn-playback:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-score { background: #fef3c7; color: #b45309; }
        .btn-score:hover { background: #fde68a; }
        .btn-score:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .score-result {
            margin-top: 6px;
            padding: 8px 16px;
            border-radius: 12px;
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            display: none;
            font-size: 14px;
            line-height: 1.8;
            width: 100%;
        }
        .score-result.show { display: block; }
        .score-result .score-number { font-size: 20px; font-weight: 700; color: #16a34a; }
        .score-result .score-feedback { color: #374151; margin-top: 4px; }
        .score-result .score-feedback .correct { color: #16a34a; }
        .score-result .score-feedback .improve { color: #dc2626; }
        .score-result .score-demo { margin-top: 6px; padding: 6px 12px; background: #eef2ff; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .record-status { font-size: 11px; color: #8f7a66; margin-left: 4px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 12px 18px;
            background: #f5f2ed;
            border-radius: 30px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-text { font-size: 14px; color: #5f5346; flex: 1; }
        .status-position { font-size: 13px; color: #8f7a66; font-weight: 500; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2a24;
            color: #f5f1eb;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .toast.show { opacity: 1; }

        .ai-vision-container { display: flex; flex-direction: column; gap: 16px; }
        .ai-upload-area { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .ai-upload-area input[type="file"] { display: none; }
        .ai-upload-area .file-label {
            background: #2d2a24;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        .ai-upload-area .file-label:hover { background: #1f1b16; }
        .ai-upload-area .file-name { color: #5f5346; font-size: 14px; }
        .ai-upload-area select {
            padding: 10px 18px;
            border-radius: 40px;
            border: 2px solid #d0d8e0;
            background: white;
            font-size: 14px;
            font-weight: 600;
            color: #2d2a24;
            cursor: pointer;
        }
        .ai-image-preview { max-width: 100%; max-height: 300px; border-radius: 16px; border: 1px solid #e0d8cf; display: none; margin: 8px 0; }
        .ai-image-preview.show { display: block; }
        .ai-generate-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
        }
        .ai-generate-btn:hover { background: #1d4ed8; }
        .ai-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-result-area { margin-top: 12px; border-top: 1px solid #e8e4de; padding-top: 16px; }
        .ai-result-area .sentence-block {
            background: #fafcff;
            border: 1px solid #e8edf2;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
        }
        .ai-result-area .sentence-block .pt-line { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
        .ai-result-area .sentence-block .zh-line { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding-left: 24px; }

        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .history-stats .stat-card { background: #f5f7fa; padding: 14px 16px; border-radius: 16px; text-align: center; }
        .history-stats .stat-card .stat-number { font-size: 24px; font-weight: 700; color: #2d2a24; }
        .history-stats .stat-card .stat-label { font-size: 12px; color: #6b7a8a; }
        .history-list { max-height: 350px; overflow-y: auto; }
        .history-list .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #e8e4de;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .history-list .history-item .h-date { color: #6b7a8a; font-size: 12px; }
        .history-list .history-item .h-score { font-weight: 700; color: #16a34a; }
        .history-list .history-item .h-type { background: #e8e4de; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .history-list .history-item .h-view { color: #2563eb; cursor: pointer; font-weight: 600; font-size: 12px; }
        .history-list .history-item .h-view:hover { text-decoration: underline; }
        .history-clear-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
        }
        .history-clear-btn:hover { background: #b91c1c; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .app { padding: 20px 16px 28px; border-radius: 32px; }
            .header h1 { font-size: 22px; }
            .controls { padding: 14px 16px; gap: 10px; }
            .controls select { min-width: 120px; font-size: 12px; }
            .controls .speed-group input[type="range"] { width: 80px; }
            .controls .readtone-hint { font-size: 10px; padding: 2px 10px; white-space: normal; }
            .category-tabs button { font-size: 14px; padding: 10px 12px; }
            .article-tabs button { flex: 0 0 calc(33.33% - 6px); font-size: 12px; padding: 8px 4px; }
            .article-content { font-size: 16px; padding: 18px 14px; max-height: 400px; }
            .play-controls button { font-size: 15px; padding: 14px 18px; min-width: 70px; }
            .status-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
            .top-actions button { font-size: 13px; padding: 8px 14px; }
            .sentence { padding: 4px 8px; gap: 4px; }
            .sentence .text { font-size: 16px; }
            .sentence-actions { padding-left: 8px; }
            .sentence-actions button { font-size: 11px; padding: 3px 10px; }
            .tab-bar button { font-size: 13px; padding: 8px 14px; }
            .history-stats { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .article-tabs button { flex: 0 0 calc(50% - 5px); font-size: 11px; padding: 6px 4px; }
            .play-controls button { font-size: 13px; padding: 12px 12px; min-width: 60px; }
            .sentence .text { font-size: 15px; }
            .category-tabs { flex-direction: column; gap: 6px; }
            .category-tabs button { font-size: 13px; padding: 8px 12px; }
            .tab-bar { gap: 4px; }
            .tab-bar button { font-size: 12px; padding: 6px 10px; }
            .ai-upload-area { flex-direction: column; align-items: stretch; }
            .history-stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>📖 葡語學習</h1>
            <span class="badge" id="totalBadge">50 篇文章</span>
        </div>

        <div class="controls">
            <label>🎙️ 語音</label>
            <select id="voiceSelect">
                <option value="pt-PT-FernandaNeural">🇵🇹 Fernanda (女聲) - 標準</option>
                <option value="pt-PT-RaquelNeural">🇵🇹 Raquel (女聲) - 自然</option>
                <option value="pt-PT-DuarteNeural">🇵🇹 Duarte (男聲) - 沈穩</option>
                <option value="pt-BR-FranciscaNeural">🇧🇷 Francisca (女聲) - 巴西</option>
                <option value="pt-BR-AntonioNeural">🇧🇷 Antonio (男聲) - 巴西</option>
                <option value="browser">🌐 瀏覽器語音 (備用)</option>
            </select>
            <span class="voice-status fixed" id="voiceStatus">✅ Azure: pt-PT-FernandaNeural</span>
            <div class="speed-group">
                <label>🐢</label>
                <input type="range" id="speedSlider" min="0.4" max="1.8" step="0.05" value="0.85">
                <span class="speed-val" id="speedDisplay">0.85</span>
                <label>🐇</label>
            </div>
            <span class="readtone-hint">💡 選擇不同語音，聽聽看哪個最適合</span>
        </div>

        <div class="tab-bar" id="tabBar">
            <button class="active" data-tab="reading">📖 跟讀文章</button>
            <button data-tab="aivision">🤖 AI 看圖造句</button>
            <button data-tab="history">📊 練習記錄</button>
        </div>

        <div class="tab-content active" id="tabReading">
            <div class="top-actions">
                <button class="btn-toggle" id="toggleMaskBtn">🔒 遮擋葡語</button>
                <button class="btn-show-all" id="showAllBtn">🔓 全部顯示</button>
                <button class="btn-hide-all" id="hideAllBtn">🔒 全部遮擋</button>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="active-a1" data-category="a1">📘 A1-A2 看圖說話</button>
                <button data-category="a2">📗 A2-B1 看圖說話</button>
            </div>

            <div class="article-tabs" id="articleTabs"></div>

            <div class="play-controls">
                <button class="btn-play" id="playBtn">▶️ 播放全部</button>
                <button class="btn-pause" id="pauseBtn" disabled>⏸️ 暫停</button>
                <button class="btn-resume" id="resumeBtn" disabled>▶️ 繼續</button>
            </div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="article-content" id="articleContent">
                <div style="text-align:center;padding:60px 20px;color:#8f7a66;font-size:18px;">⏳ 載入中...</div>
            </div>
        </div>

        <div class="tab-content" id="tabAivision">
            <div class="ai-vision-container">
                <div class="ai-upload-area">
                    <label class="file-label" for="imageUpload">📁 選擇圖片</label>
                    <input type="file" id="imageUpload" accept="image/*">
                    <span class="file-name" id="fileName">未選擇檔案</span>
                    <select id="levelSelect">
                        <option value="A1">A1</option>
                        <option value="A2" selected>A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                    </select>
                    <button class="ai-generate-btn" id="generateBtn">🚀 生成句子</button>
                    <button class="ai-generate-btn" id="clearImageBtn" style="background:#6b7a8a;">🗑️ 清除</button>
                </div>

                <img class="ai-image-preview" id="imagePreview" alt="圖片預覽">

                <div class="ai-result-area" id="aiResultArea">
                    <div style="text-align:center;padding:20px;color:#8f7a66;font-size:16px;">
                        📸 請上傳圖片並選擇難度，點擊「生成句子」
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tabHistory">
            <div id="historyContainer">
                <div class="history-stats" id="historyStats">
                    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">總練習次數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statAvg">-</div><div class="stat-label">平均分數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statHigh">-</div><div class="stat-label">最高分</div></div>
                    <div class="stat-card"><div class="stat-number" id="statLow">-</div><div class="stat-label">最低分</div></div>
                </div>
                <div class="history-list" id="historyList">
                    <div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>
                </div>
                <button class="history-clear-btn" id="clearHistoryBtn">🗑️ 清除所有記錄</button>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-text" id="statusText">🔊 點擊葡語句子播放，或按「播放全部」</span>
            <span class="status-position" id="statusPosition">句子 0 / 0</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ================================================================
    // 1. 文章數據 (50篇)
    // ================================================================

    // 為了節省篇幅，文章數據被濃縮。但完整代碼中包含全部20篇A1和30篇A2。
    // 由於對話框字數限制，此處省略完整文章數據。
    // 請使用你原本已有的 ARTICLES_A1 和 ARTICLES_A2 數據。
    // ================================================================

    // 注意：此代碼為示範框架，實際使用時請將完整的 50 篇文章數據貼在此處。
    // 你可以從之前的備份中複製 ARTICLES_A1 和 ARTICLES_A2。

    const ARTICLES_A1 = [];
    const ARTICLES_A2 = [];

    // 模擬數據，實際使用時請替換為完整文章
    // 為避免空白頁，加入一篇示例文章
    ARTICLES_A1.push({
        id: 'a1_1',
        title: 'Casa de banho',
        titleZh: '浴室',
        icon: '🛁',
        sentences: [
            { text: 'Nesta imagem, vejo uma casa de banho moderna e funcional.', type: 'pt' },
            { text: '在这张图片里，我看到一间现代且实用的浴室。', type: 'zh' }
        ]
    });

    const ALL_ARTICLES = { a1: ARTICLES_A1, a2: ARTICLES_A2 };

    // ================================================================
    // 2. 共用變數
    // ================================================================

    let currentCategory = 'a1';
    let currentArticleIndex = 0;
    let currentSentenceIndex = 0;
    let isPlaying = false;
    let isPaused = false;
    let isFinished = false;
    let currentUtterance = null;
    let speechRate = 0.85;
    let timeoutId = null;
    let isCancelled = false;
    let isSinglePlay = false;
    let isMasked = false;
    let useAzure = true;
    let currentAzureVoice = 'pt-PT-FernandaNeural';

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    const PROXY_URL = 'https://azure-tts-proxy.vercel.app/api/tts';
    const PROXY_SECRET = 'mysecret2026';

    // ================================================================
    // 3. 工具函數
    // ================================================================

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { el.classList.remove('show'); }, 2000);
    }
    let toastTimeout = null;

    function base64ToBlob(base64, mimeType) {
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
    }

    function getCurrentArticles() { return ALL_ARTICLES[currentCategory] || []; }
    function getCurrentArticle() {
        const articles = getCurrentArticles();
        return articles[currentArticleIndex] || null;
    }

    function stopSpeaking() {
        if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }
        clearTimeout(timeoutId);
        isCancelled = true;
    }

    // ================================================================
    // 4. 語音函數
    // ================================================================

    function speakText(text, callback) {
        if (!text) { if (callback) callback(); return; }
        let clean = text.replace(/[“”"']/g, '').trim();
        if (!clean) { if (callback) callback(); return; }
        if (useAzure) {
            speakWithAzure(clean, callback);
        } else {
            speakWithBrowser(clean, callback);
        }
    }

    function speakWithAzure(text, callback) {
        fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-proxy-secret': PROXY_SECRET },
            body: JSON.stringify({ action: 'tts', text: text, voice: currentAzureVoice || 'pt-PT-FernandaNeural', rate: speechRate })
        })
        .then(response => {
            if (!response.ok) { return response.json().then(err => { throw new Error(err.error || 'Azure 請求失敗'); }); }
            return response.json();
        })
        .then(data => {
            if (!data.success || !data.audio) throw new Error(data.error || 'Azure 回傳資料錯誤');
            const audioBlob = base64ToBlob(data.audio, 'audio/mp3');
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play();
            audio.onended = function() { URL.revokeObjectURL(audioUrl); if (callback) callback(); };
            audio.onerror = function() { URL.revokeObjectURL(audioUrl); showToast('⚠️ Azure 語音播放失敗'); if (callback) callback(); };
        })
        .catch(error => {
            console.error('Azure TTS 錯誤:', error);
            showToast('⚠️ Azure 錯誤，改用瀏覽器語音');
            speakWithBrowser(text, callback);
        });
    }

    function speakWithBrowser(text, callback) {
        if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-PT';
        utterance.rate = speechRate;
        utterance.pitch = 1;
        utterance.onend = function() { currentUtterance = null; if (callback) callback(); };
        utterance.onerror = function() { currentUtterance = null; if (!isCancelled && callback) callback(); };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // ================================================================
    // 5. AI 代理函數
    // ================================================================

    async function generateAISentences(prompt) {
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-proxy-secret': PROXY_SECRET },
            body: JSON.stringify({ action: 'openai', prompt: prompt })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'OpenAI 請求失敗');
        }

        const data = await response.json();
        return data.content;
    }

    async function sttWithProxy(audioBase64) {
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-proxy-secret': PROXY_SECRET },
            body: JSON.stringify({ action: 'stt', sttAudio: audioBase64 })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'STT 請求失敗');
        }

        const data = await response.json();
        return data.text || '';
    }

    // ================================================================
    // 6. 遮擋模式
    // ================================================================

    function applyMask() {
        document.querySelectorAll('#articleContent .sentence .text.pt-text').forEach(el => {
            if (!el.classList.contains('unmasked')) el.classList.add('masked');
        });
        isMasked = true;
        toggleMaskBtn.textContent = '🔓 顯示葡語';
        toggleMaskBtn.classList.add('unmask');
    }

    function removeMask() {
        document.querySelectorAll('#articleContent .sentence .text.pt-text').forEach(el => {
            el.classList.remove('masked');
        });
        isMasked = false;
        toggleMaskBtn.textContent = '🔒 遮擋葡語';
        toggleMaskBtn.classList.remove('unmask');
    }

    function toggleMask() {
        if (isMasked) { removeMask(); showToast('🔓 已顯示所有葡語'); }
        else { applyMask(); showToast('🔒 已遮擋葡語'); }
    }

    // ================================================================
    // 7. 跟讀文章渲染 (精簡版)
    // ================================================================

    function renderTabs() {
        const articles = getCurrentArticles();
        let html = '';
        articles.forEach((article, idx) => {
            const active = idx === currentArticleIndex ? 'active' : '';
            html += `<button class="${active}" data-index="${idx}">
                        <span class="icon">${article.icon}</span> ${article.title}
                        <span class="zh-label">${article.titleZh}</span>
                    </button>`;
        });
        articleTabs.innerHTML = html;
        document.querySelectorAll('.article-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.index);
                if (idx !== currentArticleIndex) {
                    stopSpeaking();
                    isMasked = false;
                    toggleMaskBtn.textContent = '🔒 遮擋葡語';
                    toggleMaskBtn.classList.remove('unmask');
                    renderArticle(idx);
                    const articles2 = getCurrentArticles();
                    showToast(`📖 已切換到 ${articles2[idx].icon} ${articles2[idx].title}`);
                }
            });
        });
    }

    function renderCategoryTabs() {
        const btns = categoryTabs.querySelectorAll('button');
        btns.forEach(btn => {
            btn.classList.remove('active-a1', 'active-a2');
            if (btn.dataset.category === 'a1' && currentCategory === 'a1') {
                btn.classList.add('active-a1');
            } else if (btn.dataset.category === 'a2' && currentCategory === 'a2') {
                btn.classList.add('active-a2');
            }
        });
    }

    function renderArticle(index) {
        const articles = getCurrentArticles();
        const article = articles[index];
        if (!article || !article.sentences) {
            articleContent.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#b15e4a;font-size:18px;">⚠️ 文章數據錯誤</div>';
            return;
        }
        let html = '';
        const sentences = article.sentences;
        sentences.forEach((item, idx) => {
            const label = item.type === 'pt' ? '🇵🇹' : '🇨🇳';
            const cls = item.type === 'pt' ? 'text pt-text' : 'text zh-text';
            const isPt = item.type === 'pt';
            const key = `rec_${article.id}_${idx}`;
            const hasRecording = localStorage.getItem(key) !== null;

            html += `<div class="sentence" data-index="${idx}" data-type="${item.type}">`;
            html += `<span class="label">${label}</span>`;
            html += `<span class="${cls}" data-index="${idx}">${item.text}</span>`;
            html += `</div>`;

            if (isPt) {
                html += `<div class="sentence-actions" data-index="${idx}">`;
                html += `<button class="btn-play-icon play-icon" data-index="${idx}">▶ 播放</button>`;
                html += `<button class="btn-record record-btn" data-key="${key}" data-index="${idx}">🎙 錄音</button>`;
                html += `<button class="btn-playback playback-btn" data-key="${key}" data-index="${idx}" ${!hasRecording ? 'disabled' : ''}>🔊 回放</button>`;
                html += `<button class="btn-score score-btn" data-key="${key}" data-index="${idx}" data-text="${item.text}" ${!hasRecording ? 'disabled' : ''}>⭐ 評分</button>`;
                if (hasRecording) { html += `<span class="record-status">✅</span>`; }
                html += `</div>`;
                html += `<div class="score-result" id="scoreResult_${article.id}_${idx}"></div>`;
            }
        });
        articleContent.innerHTML = html;
        currentArticleIndex = index;
        currentSentenceIndex = 0;
        isPlaying = false;
        isPaused = false;
        isFinished = false;
        isCancelled = false;
        isSinglePlay = false;
        progressBar.style.width = '0%';
        renderTabs();
        renderCategoryTabs();
        updateStatus();
        updateHighlight();
        stopSpeaking();
        updateButtons();
        bindEvents();
        if (isMasked) applyMask();
        document.querySelectorAll('.score-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = this.dataset.key;
                const text = this.dataset.text;
                const idx = parseInt(this.dataset.index);
                handleScore(key, text, idx);
            });
        });
    }

    function updateHighlight() {
        const sentences = articleContent.querySelectorAll('.sentence');
        sentences.forEach((el, idx) => {
            el.classList.toggle('highlight', idx === currentSentenceIndex);
        });
        if (sentences[currentSentenceIndex]) {
            sentences[currentSentenceIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function updateStatus() {
        const article = getCurrentArticle();
        if (!article) return;
        const total = article.sentences.length;
        const pct = Math.round((currentSentenceIndex / total) * 100);
        progressBar.style.width = Math.min(pct, 100) + '%';
        let msg = '';
        if (isFinished) msg = '✅ 全部播放完成！點擊「播放全部」重新開始';
        else if (isPlaying) msg = `🔊 播放中... 句子 ${currentSentenceIndex + 1} / ${total}`;
        else if (isPaused) msg = `⏸️ 已暫停 — 句子 ${currentSentenceIndex + 1} / ${total}`;
        else msg = `📖 句子 ${currentSentenceIndex + 1} / ${total} — 點擊葡語句子播放，或按「播放全部」`;
        statusText.textContent = msg;
        statusPosition.textContent = `句子 ${currentSentenceIndex + 1} / ${total}`;
    }

    function updateButtons() {
        if (isFinished) {
            playBtn.textContent = '▶️ 重新播放';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            return;
        }
        if (isPlaying) {
            playBtn.textContent = '🔊 播放中...';
            playBtn.classList.add('playing');
            pauseBtn.disabled = false;
            resumeBtn.disabled = true;
        } else if (isPaused) {
            playBtn.textContent = '▶️ 繼續';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
        } else {
            playBtn.textContent = '▶️ 播放全部';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
        }
    }

    // ================================================================
    // 8. 播放邏輯 (精簡)
    // ================================================================

    function playSingleSentence(index) {
        const article = getCurrentArticle();
        if (!article || index >= article.sentences.length) return;
        const item = article.sentences[index];
        if (item.type !== 'pt') { showToast('⚠️ 只能播放葡語句子'); return; }
        stopSpeaking();
        isPlaying = false;
        isPaused = false;
        isCancelled = false;
        isSinglePlay = true;
        currentSentenceIndex = index;
        updateStatus();
        updateHighlight();
        updateButtons();
        speakText(item.text, function() {
            isSinglePlay = false;
            isPlaying = false;
            updateStatus();
            updateButtons();
            showToast('✅ 播放完成');
        });
    }

    function startPlaying() {
        const article = getCurrentArticle();
        if (!article) return;
        if (currentSentenceIndex >= article.sentences.length) currentSentenceIndex = 0;
        isPlaying = true;
        isPaused = false;
        isFinished = false;
        isCancelled = false;
        isSinglePlay = false;
        updateStatus();
        updateButtons();
        speakNextSentence(currentSentenceIndex);
    }

    function speakNextSentence(index) {
        if (isCancelled) { isCancelled = false; return; }
        const article = getCurrentArticle();
        if (!article) return;
        if (index >= article.sentences.length) {
            isPlaying = false;
            isPaused = false;
            isFinished = true;
            isSinglePlay = false;
            progressBar.style.width = '100%';
            updateStatus();
            updateButtons();
            showToast('✅ 全部播放完成！');
            return;
        }
        currentSentenceIndex = index;
        const item = article.sentences[index];
        updateStatus();
        updateHighlight();
        updateButtons();
        if (item.type === 'pt') {
            speakText(item.text, function() {
                if (isCancelled) { isCancelled = false; return; }
                if (isPlaying && !isPaused) {
                    timeoutId = setTimeout(function() { speakNextSentence(index + 1); }, 200);
                }
            });
        } else {
            if (isPlaying && !isPaused) {
                timeoutId = setTimeout(function() { speakNextSentence(index + 1); }, 100);
            }
        }
    }

    function handlePlay() {
        const article = getCurrentArticle();
        if (!article) return;
        if (isFinished) { currentSentenceIndex = 0; isFinished = false; isPaused = false; isPlaying = false; isCancelled = false; isSinglePlay = false; startPlaying(); return; }
        if (isPaused) { isCancelled = false; isPaused = false; isPlaying = true; isFinished = false; isSinglePlay = false; updateStatus(); updateButtons(); speakNextSentence(currentSentenceIndex); return; }
        if (isPlaying) return;
        if (currentSentenceIndex >= article.sentences.length) currentSentenceIndex = 0;
        isCancelled = false;
        isSinglePlay = false;
        startPlaying();
    }

    function handlePause() {
        if (isPlaying) { isPaused = true; isPlaying = false; stopSpeaking(); updateStatus(); updateButtons(); showToast('⏸️ 已暫停'); }
    }

    function handleResume() {
        if (isPaused) { isCancelled = false; isPaused = false; isPlaying = true; isFinished = false; isSinglePlay = false; updateStatus(); updateButtons(); speakNextSentence(currentSentenceIndex); showToast('▶️ 繼續播放'); }
    }

    // ================================================================
    // 9. 跟讀文章事件綁定
    // ================================================================

    function bindEvents() {
        document.querySelectorAll('#articleContent .sentence .text.pt-text').forEach(el => {
            el.addEventListener('click', function(e) {
                if (isMasked) { this.classList.toggle('masked'); this.classList.toggle('unmasked'); return; }
                const idx = parseInt(this.dataset.index);
                const article = getCurrentArticle();
                if (!article) return;
                const sentence = article.sentences[idx];
                if (sentence.type === 'pt') {
                    if (isPlaying && !isSinglePlay) { stopSpeaking(); isPlaying = false; isPaused = false; }
                    playSingleSentence(idx);
                }
            });
        });

        document.querySelectorAll('#articleContent .play-icon').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const idx = parseInt(this.dataset.index);
                const article = getCurrentArticle();
                if (!article) return;
                const sentence = article.sentences[idx];
                if (sentence.type === 'pt') {
                    if (isPlaying && !isSinglePlay) { stopSpeaking(); isPlaying = false; isPaused = false; }
                    playSingleSentence(idx);
                }
            });
        });

        document.querySelectorAll('#articleContent .record-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = this.dataset.key;
                const idx = parseInt(this.dataset.index);
                toggleRecording(this, key, idx);
            });
        });

        document.querySelectorAll('#articleContent .playback-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = this.dataset.key;
                playRecording(key);
            });
        });
    }

    // ================================================================
    // 10. 錄音功能 (通用)
    // ================================================================

    function toggleRecording(btn, key, index) {
        if (isRecording) {
            if (mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                btn.textContent = '🎙 錄音';
                btn.classList.remove('recording');
                showToast('⏹️ 錄音已停止');
            }
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showToast('⚠️ 此瀏覽器不支援錄音功能');
            return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                const options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported('audio/webm')) { options.mimeType = 'audio/mp4'; }
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => { if (event.data.size > 0) audioChunks.push(event.data); };

                mediaRecorder.onstop = function() {
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    if (blob.size === 0) { showToast('⚠️ 錄音檔案為空，請重新錄製'); return; }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const base64 = e.target.result.split(',')[1];
                            if (base64.length > 4000000) { showToast('⚠️ 錄音檔案太大，請縮短錄音時間'); return; }
                            localStorage.setItem(key, base64);
                            localStorage.setItem(key + '_type', mediaRecorder.mimeType || 'audio/webm');
                            btn.textContent = '🎙 錄音';
                            btn.classList.remove('recording');
                            isRecording = false;
                            const playbackBtn = btn.parentElement.querySelector('.playback-btn');
                            if (playbackBtn) { playbackBtn.disabled = false; }
                            const scoreBtn = btn.parentElement.querySelector('.score-btn');
                            if (scoreBtn) { scoreBtn.disabled = false; }
                            const statusSpan = btn.parentElement.querySelector('.record-status');
                            if (!statusSpan) { const span = document.createElement('span'); span.className = 'record-status'; span.textContent = '✅'; btn.parentElement.appendChild(span); } else { statusSpan.textContent = '✅'; }
                            showToast('✅ 錄音已儲存！');
                        } catch (err) { showToast('⚠️ 錄音儲存失敗: ' + err.message); console.error('儲存錯誤:', err); }
                    };
                    reader.onerror = function() { showToast('⚠️ 讀取錄音檔案失敗'); };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                btn.textContent = '⏹ 停止';
                btn.classList.add('recording');
                showToast('🎙 錄音中... 點擊停止');
            })
            .catch(err => {
                console.error('麥克風錯誤:', err);
                if (err.name === 'NotAllowedError') { showToast('⚠️ 請允許麥克風權限後再試'); } else if (err.name === 'NotFoundError') { showToast('⚠️ 找不到麥克風裝置'); } else { showToast('⚠️ 無法存取麥克風: ' + err.message); }
            });
    }

    function playRecording(key) {
        const data = localStorage.getItem(key);
        if (!data) { showToast('⚠️ 沒有找到錄音'); return; }
        try {
            const mimeType = localStorage.getItem(key + '_type') || 'audio/webm';
            const blob = base64ToBlob(data, mimeType);
            if (blob.size === 0) { showToast('⚠️ 錄音檔案已損毀'); return; }
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            audio.onerror = function(e) { console.error('播放錯誤:', e); showToast('⚠️ 無法播放錄音，可能格式不支援'); downloadRecording(blob); };
            audio.onended = function() { URL.revokeObjectURL(audioUrl); showToast('✅ 回放結束'); };
            audio.play();
            showToast('🔊 回放錄音中...');
        } catch (e) { console.error('回放錯誤:', e); showToast('⚠️ 無法讀取錄音檔案'); try { const blob = base64ToBlob(data, 'audio/webm'); downloadRecording(blob); } catch (err) { showToast('⚠️ 錄音檔案已損毀，請重新錄製'); } }
    }

    function downloadRecording(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recording_${Date.now()}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('📥 已下載錄音，可用播放器開啟');
    }

    // ================================================================
    // 13. AI 內容解析
    // ================================================================

    function parseAIContent(content) {
        const lines = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        const sentences = [];
        let i = 0;

        while (i < lines.length) {
            let line = lines[i];
            line = line.replace(/^[\d]+[\.\、\、]\s*/, '').replace(/^[\*\-\•]\s*/, '').trim();
            if (!line) { i++; continue; }

            const isChinese = /[\u4e00-\u9fff]/.test(line);

            if (!isChinese) {
                const ptLine = line;
                i++;
                let zhLine = '';
                while (i < lines.length) {
                    let nextLine = lines[i];
                    nextLine = nextLine.replace(/^[\d]+[\.\、\、]\s*/, '').replace(/^[\*\-\•]\s*/, '').trim();
                    if (!nextLine) { i++; continue; }
                    if (/[\u4e00-\u9fff]/.test(nextLine)) {
                        zhLine = nextLine;
                        i++;
                        break;
                    } else {
                        i++;
                    }
                }
                if (ptLine) {
                    sentences.push({ pt: ptLine, zh: zhLine || '(中文翻譯未提供)' });
                }
            } else {
                i++;
            }
        }

        return sentences;
    }

        html += `</div>`;

            html += `<button class="btn-record" onclick="toggleAIRecording(this, '${key}')">🎙 錄音</button>`;
            html += `<button class="btn-playback" onclick="playAIRecording('${key}')" ${!hasRecording ? 'disabled' : ''}>🔊 回放</button>`;

            html += `</div>`;
        });

        container.innerHTML = html;

                const idx = parseInt(this.dataset.aiIndex);

                }
            });
        });

    function playAISentence(key, text, callback) {
        if (!text) { if (callback) callback(); return; }

    function playAllAISentences() {
        const sentences = window._aiSentences || [];
        const prefix = currentAIPrefix;
        if (sentences.length === 0) { showToast('⚠️ 沒有可播放的句子'); return; }
        let idx = 0;
        function playNext() {
            if (idx >= sentences.length) { showToast('✅ 全部播放完成！'); return; }
            const key = `${prefix}${idx}`;
            playAISentence(key, sentences[idx].pt, function() {
                idx++;
                setTimeout(playNext, 300);
            });
        }
        playNext();

    function toggleAIMask() {
        aiMasked = !aiMasked;
        document.querySelectorAll('.ai-pt-text').forEach(el => {
            if (aiMasked) { el.classList.add('masked'); } else { el.classList.remove('masked'); }
        });
        const btn = document.querySelector('.btn-toggle');
        if (btn) { btn.textContent = aiMasked ? '🔓 顯示葡語' : '🔒 遮擋葡語'; }
    }

    function toggleAIRecording(btn, key) {
        if (isRecording) {
            if (mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                btn.textContent = '🎙 錄音';
                btn.classList.remove('recording');
                showToast('⏹️ 錄音已停止');
            }
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showToast('⚠️ 此瀏覽器不支援錄音功能');
            return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                const options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported('audio/webm')) { options.mimeType = 'audio/mp4'; }
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => { if (event.data.size > 0) audioChunks.push(event.data); };

                mediaRecorder.onstop = function() {
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    if (blob.size === 0) { showToast('⚠️ 錄音檔案為空，請重新錄製'); return; }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const base64 = e.target.result.split(',')[1];
                            if (base64.length > 4000000) { showToast('⚠️ 錄音檔案太大，請縮短錄音時間'); return; }
                            localStorage.setItem(key, base64);
                            localStorage.setItem(key + '_type', mediaRecorder.mimeType || 'audio/webm');
                            btn.textContent = '🎙 錄音';
                            btn.classList.remove('recording');
                            isRecording = false;
                            const parent = btn.parentElement;
                            const playbackBtn = parent.querySelector('.btn-playback');
                            if (playbackBtn) { playbackBtn.disabled = false; }
                            const scoreBtn = parent.querySelector('.btn-score');
                            if (scoreBtn) { scoreBtn.disabled = false; }
                            let statusSpan = parent.querySelector('.record-status');
                            if (!statusSpan) { const span = document.createElement('span'); span.className = 'record-status'; span.textContent = '✅'; parent.appendChild(span); } else { statusSpan.textContent = '✅'; }
                            showToast('✅ 錄音已儲存！');
                        } catch (err) { showToast('⚠️ 錄音儲存失敗: ' + err.message); console.error('儲存錯誤:', err); }
                    };
                    reader.onerror = function() { showToast('⚠️ 讀取錄音檔案失敗'); };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                btn.textContent = '⏹ 停止';
                btn.classList.add('recording');
                showToast('🎙 錄音中... 點擊停止');
            })
            .catch(err => {
                console.error('麥克風錯誤:', err);
                if (err.name === 'NotAllowedError') { showToast('⚠️ 請允許麥克風權限後再試'); } else if (err.name === 'NotFoundError') { showToast('⚠️ 找不到麥克風裝置'); } else { showToast('⚠️ 無法存取麥克風: ' + err.message); }
            });
    }

    function playAIRecording(key) {
        const data = localStorage.getItem(key);
        if (!data) { showToast('⚠️ 沒有找到錄音'); return; }
        try {
            const mimeType = localStorage.getItem(key + '_type') || 'audio/webm';
            const blob = base64ToBlob(data, mimeType);
            if (blob.size === 0) { showToast('⚠️ 錄音檔案已損毀'); return; }
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            audio.onerror = function(e) { console.error('播放錯誤:', e); showToast('⚠️ 無法播放錄音，可能格式不支援'); downloadRecording(blob); };
            audio.onended = function() { URL.revokeObjectURL(audioUrl); showToast('✅ 回放結束'); };
            audio.play();
            showToast('🔊 回放錄音中...');
        } catch (e) { console.error('回放錯誤:', e); showToast('⚠️ 無法讀取錄音檔案'); try { const blob = base64ToBlob(data, 'audio/webm'); downloadRecording(blob); } catch (err) { showToast('⚠️ 錄音檔案已損毀，請重新錄製'); } }
    }

                });
            }

            scoreResult.innerHTML = `
                <div>
                    <span class="score-number">⭐ ${result.score}/10</span>
                    <span style="margin-left:12px;font-size:14px;color:#374151;">${result.summary || ''}</span>
                </div>
                <div class="score-feedback">${feedbackHtml}</div>
                <div class="score-demo">
                    <span>🔊 標準發音示範:</span>
                    <button class="btn-play-icon" onclick="playAISentence('demo', '${text.replace(/'/g, "\\'")}')" style="border:none;padding:2px 12px;border-radius:20px;cursor:pointer;">▶ 播放</button>
                </div>
            `;

            saveHistory({
                type: 'AI看圖造句',
                sentence: text,
                score: result.score,
                feedback: result.summary || '',
                detail: result.feedback || []
            });

            showToast(`✅ 評分完成！分數: ${result.score}/10`);

        } catch (error) {
            console.error('評分錯誤:', error);
            scoreResult.innerHTML = `<div style="color:#dc2626;">⚠️ 評分失敗: ${error.message}。請稍後再試</div>`;
            showToast('⚠️ 評分失敗，請稍後再試');
        }
    }

    // ================================================================
    // 16. 練習記錄
    // ================================================================

    function saveHistory(record) {
        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
        record.date = new Date().toISOString();
        history.unshift(record);
        if (history.length > 500) history.pop();
        localStorage.setItem('practiceHistory', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyContainer');
        if (!container) return;

        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');

        const total = history.length;
        const scores = history.map(h => h.score).filter(s => s !== undefined && s !== null);
        const avg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
        const high = scores.length > 0 ? Math.max(...scores) : '-';
        const low = scores.length > 0 ? Math.min(...scores) : '-';

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statAvg').textContent = avg;
        document.getElementById('statHigh').textContent = high;
        document.getElementById('statLow').textContent = low;

        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>';
            return;
        }

        let html = '';
        history.slice(0, 100).forEach((item, idx) => {
            const date = new Date(item.date);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
            const typeIcon = item.type === '跟讀' ? '🗣️' : (item.type === 'AI看圖造句' ? '🤖' : '📝');
            const sentencePreview = item.sentence ? (item.sentence.length > 40 ? item.sentence.substring(0, 40) + '...' : item.sentence) : '(無句子)';
            html += `
                <div class="history-item">
                    <span class="h-date">${dateStr}</span>
                    <span class="h-type">${typeIcon} ${item.type || '練習'}</span>
                    <span>${sentencePreview}</span>
                    <span class="h-score">${item.score || '-'}/10</span>
                    <span class="h-view" onclick="viewHistoryDetail(${idx})">📖 詳情</span>
                </div>
            `;
        });
        list.innerHTML = html;
    }

    function viewHistoryDetail(index) {
        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
        const item = history[index];
        if (!item) return;
        let detail = `📋 練習詳情\n`;
        detail += `📅 日期: ${new Date(item.date).toLocaleString()}\n`;
        detail += `📂 類型: ${item.type || '練習'}\n`;
        detail += `📝 句子: ${item.sentence || '(無)'}\n`;
        detail += `⭐ 評分: ${item.score || '-'}/10\n`;
        if (item.feedback) { detail += `💬 反饋: ${item.feedback}\n`; }
        if (item.detail && item.detail.length > 0) {
            detail += `📊 詳細分析:\n`;
            item.detail.forEach(d => {
                detail += `   ${d.status === 'correct' ? '✅' : '⚠️'} ${d.word}: ${d.suggestion || ''}\n`;
            });
        }
        alert(detail);
    }

    // ================================================================
    // 17. 頁籤切換
    // ================================================================

    document.querySelectorAll('.tab-bar button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const tab = this.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            if (tab === 'history') renderHistory();
        });
    });

    // ================================================================
    // 18. 控制事件
    // ================================================================

    playBtn.addEventListener('click', handlePlay);
    pauseBtn.addEventListener('click', handlePause);
    resumeBtn.addEventListener('click', handleResume);

    progressWrap.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        const article = getCurrentArticle();
        if (!article) return;
        const total = article.sentences.length;
        const targetIndex = Math.floor(pct * total);
        if (targetIndex < total && targetIndex !== currentSentenceIndex) {
            stopSpeaking();
            clearTimeout(timeoutId);
            isPlaying = false;
            isPaused = false;
            isFinished = false;
            isCancelled = false;
            isSinglePlay = true;
            currentSentenceIndex = targetIndex;
            const item = article.sentences[targetIndex];
            updateStatus();
            updateHighlight();
            updateButtons();
            if (item.type === 'pt') {
                speakText(item.text, function() { isSinglePlay = false; isPlaying = false; updateStatus(); updateButtons(); });
            } else { isSinglePlay = false; updateStatus(); updateButtons(); }
            showToast(`📍 跳轉到句子 ${targetIndex + 1}`);
        }
    });

    toggleMaskBtn.addEventListener('click', toggleMask);
    showAllBtn.addEventListener('click', function() { removeMask(); showToast('🔓 全部顯示'); });
    hideAllBtn.addEventListener('click', function() { applyMask(); showToast('🔒 全部遮擋'); });

    voiceSelect.addEventListener('change', function() {
        const selectedVoice = this.value;
        if (selectedVoice === 'browser') {
            useAzure = false;
            voiceStatus.textContent = '🌐 瀏覽器語音 (備用)';
            voiceStatus.className = 'voice-status fixed';
            showToast('🔊 已切換至瀏覽器語音');
        } else {
            useAzure = true;
            currentAzureVoice = selectedVoice;
            voiceStatus.textContent = `✅ Azure: ${selectedVoice}`;
            voiceStatus.className = 'voice-status fixed';
            showToast(`🔊 已切換至 ${selectedVoice}`);
        }
    });

    speedSlider.addEventListener('input', function() {
        speechRate = parseFloat(this.value);
        speedDisplay.textContent = speechRate.toFixed(2);
    });

    categoryTabs.addEventListener('click', function(e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        const category = btn.dataset.category;
        if (category === currentCategory) return;
        currentCategory = category;
        currentArticleIndex = 0;
        stopSpeaking();
        isMasked = false;
        toggleMaskBtn.textContent = '🔒 遮擋葡語';
        toggleMaskBtn.classList.remove('unmask');
        renderArticle(0);
        const catName = category === 'a1' ? 'A1-A2 看圖說話' : 'A2-B1 看圖說話';
        showToast(`📂 已切換到 ${catName}`);
    });

    document.getElementById('clearHistoryBtn').addEventListener('click', function() {
        if (confirm('確定要清除所有練習記錄嗎？此操作無法復原！')) {
            localStorage.removeItem('practiceHistory');
            renderHistory();
            showToast('🗑️ 已清除所有記錄');
        }
    });

    // ================================================================
    // 19. 鍵盤快捷鍵
    // ================================================================

    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); if (isPaused) handleResume(); else handlePlay(); }
        if (e.key === 'p' || e.key === 'P') { e.preventDefault(); handlePause(); }
        if (e.key === 'm' || e.key === 'M') { e.preventDefault(); toggleMask(); }
    });

    // ================================================================
    // 20. 初始化
    // ================================================================

    renderArticle(0);
    totalBadge.textContent = '50 篇文章';
    renderHistory();

    console.log('📖 葡語學習已載入！');
    console.log('🔒 已啟用密碼驗證，保護 Azure 額度');
    console.log('📊 Google Analytics 已啟用 (G-VB5QDP8LX9)');
    console.log('🤖 AI 看圖造句已啟用 (透過 Vercel 代理)');
    console.log('🎙️ 發音評分已啟用 (透過 Vercel 代理)');

    // ================================================================
    // 注意：請將完整的 50 篇文章數據 (ARTICLES_A1 和 ARTICLES_A2) 替換到此處
    // 你可以從之前的備份中複製過來
    // ================================================================
    </script>
</body>
</html>
