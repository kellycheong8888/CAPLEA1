<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📖 跟讀文章 · 葡語 A1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0ece6;
            min-height: 100vh;
            padding: 24px;
            padding-top: 30px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 36px 32px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2d2a24;
        }
        .header .badge {
            background: #e8e4de;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #3d352c;
        }

        /* 控制列 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 22px;
            background: #f5f2ed;
            border-radius: 24px;
            align-items: center;
        }
        .controls label {
            font-size: 14px;
            font-weight: 500;
            color: #5f5346;
        }
        .controls select {
            flex: 1;
            min-width: 130px;
            background: #ffffff;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            color: #2d2a24;
            outline: none;
            cursor: pointer;
        }
        .controls .voice-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .controls .voice-status.fixed {
            color: #1e7b4a;
            background: #e6f5ed;
        }
        .controls .voice-status.not-fixed {
            color: #b13e3e;
            background: #f5e6e6;
        }
        .controls .speed-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls .speed-group input[type="range"] {
            width: 110px;
            accent-color: #8f7a66;
            cursor: pointer;
        }
        .controls .speed-group .speed-val {
            font-size: 15px;
            font-weight: 600;
            color: #2d2a24;
            min-width: 40px;
            text-align: center;
        }
        .controls .readtone-hint {
            font-size: 12px;
            color: #7a8a9a;
            background: #eef4fa;
            padding: 4px 14px;
            border-radius: 30px;
            white-space: nowrap;
        }

        /* 頂部功能按鈕 */
        .top-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }
        .top-actions button {
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-actions button:active {
            transform: scale(0.95);
        }
        .btn-toggle {
            background: #2d2a24;
            color: #ffffff;
        }
        .btn-toggle:hover {
            background: #1f1b16;
        }
        .btn-toggle.unmask {
            background: #2d7a4a;
        }
        .btn-toggle.unmask:hover {
            background: #1f5f3a;
        }
        .btn-show-all {
            background: #e8e4de;
            color: #5f5346;
        }
        .btn-show-all:hover {
            background: #d5cfc7;
        }
        .btn-hide-all {
            background: #e8e4de;
            color: #5f5346;
        }
        .btn-hide-all:hover {
            background: #d5cfc7;
        }

        /* 文章標籤 - 彈性換行 + 固定寬度 每行5個 */
        .article-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .article-tabs button {
            flex: 0 0 calc(20% - 8px);
            min-width: 0;
            padding: 10px 6px;
            border: 2px solid #e0d8cf;
            border-radius: 40px;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #5f5346;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
            white-space: normal;
        }
        .article-tabs button:active {
            transform: scale(0.96);
        }
        .article-tabs button.active {
            background: #2d2a24;
            color: #ffffff;
            border-color: #2d2a24;
        }
        .article-tabs button .icon {
            font-size: 14px;
        }

        /* 播放控制 */
        .play-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .play-controls button {
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .play-controls button:active {
            transform: scale(0.95);
        }
        .btn-play {
            background: #2d2a24;
            color: #ffffff;
        }
        .btn-play:active {
            background: #1f1b16;
        }
        .btn-play.playing {
            background: #b15e4a;
        }
        .btn-pause {
            background: #e8e4de;
            color: #5f5346;
        }
        .btn-pause:active {
            background: #d5cfc7;
        }
        .btn-pause:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-resume {
            background: #2d7a4a;
            color: #ffffff;
        }
        .btn-resume:active {
            background: #1f5f3a;
        }
        .btn-resume:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 進度條 */
        .progress-wrap {
            background: #ede8e2;
            border-radius: 30px;
            height: 8px;
            margin-bottom: 18px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #8f7a66;
            border-radius: 30px;
            transition: width 0.2s;
        }

        /* 文章內容 */
        .article-content {
            background: #fcf9f6;
            border-radius: 28px;
            padding: 28px 24px;
            border: 1px solid #f0ebe5;
            min-height: 380px;
            max-height: 540px;
            overflow-y: auto;
            line-height: 2;
            font-size: 18px;
            color: #1f1b16;
        }
        .article-content::-webkit-scrollbar {
            width: 6px;
        }
        .article-content::-webkit-scrollbar-track {
            background: #f0ece6;
            border-radius: 10px;
        }
        .article-content::-webkit-scrollbar-thumb {
            background: #c5b8a8;
            border-radius: 10px;
        }

        .article-content .sentence {
            margin-bottom: 3px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .article-content .sentence:hover {
            background: #eef4fa;
        }
        .article-content .sentence.highlight {
            background: #faf0e0;
            padding: 8px 16px;
            border-left: 4px solid #b3a394;
        }
        .article-content .sentence .label {
            font-size: 12px;
            color: #b3a394;
            font-weight: 600;
            margin-right: 4px;
        }
        .article-content .sentence .text {
            color: #1f1b16;
            cursor: pointer;
            flex: 1;
            font-size: 18px;
        }
        .article-content .sentence .text.zh-text {
            color: #5f5346;
            cursor: default;
        }
        .article-content .sentence .text.pt-text {
            cursor: pointer;
            transition: 0.2s;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .article-content .sentence .text.pt-text:hover {
            text-decoration: underline;
            color: #1a3a5c;
        }
        /* 遮擋模式 - 黑色方塊 */
        .article-content .sentence .text.pt-text.masked {
            background: #2d2a24;
            color: #2d2a24 !important;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            user-select: none;
            transition: 0.15s;
            text-decoration: none !important;
        }
        .article-content .sentence .text.pt-text.masked:hover {
            background: #4a4440;
        }

        .article-content .sentence .play-icon {
            font-size: 14px;
            color: #8f7a66;
            opacity: 0.4;
            transition: opacity 0.2s;
            cursor: pointer;
            margin-left: 4px;
        }
        .article-content .sentence .play-icon:hover {
            opacity: 1;
        }
        .article-content .sentence .record-btn {
            font-size: 13px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 30px;
            transition: 0.15s;
            color: #5f5346;
        }
        .article-content .sentence .record-btn:hover {
            background: #e8e4de;
        }
        .article-content .sentence .record-btn.recording {
            color: #b14a4a;
            animation: blink 0.8s infinite;
        }
        .article-content .sentence .record-btn.has-recording {
            color: #2d7a4a;
        }
        .article-content .sentence .playback-btn {
            font-size: 13px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 30px;
            transition: 0.15s;
            color: #2980b9;
        }
        .article-content .sentence .playback-btn:hover {
            background: #e8f0f8;
        }
        .article-content .sentence .playback-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .article-content .sentence .record-status {
            font-size: 11px;
            color: #8f7a66;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 狀態欄 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 12px 18px;
            background: #f5f2ed;
            border-radius: 30px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-text {
            font-size: 14px;
            color: #5f5346;
            flex: 1;
        }
        .status-position {
            font-size: 13px;
            color: #8f7a66;
            font-weight: 500;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2a24;
            color: #f5f1eb;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .app { padding: 20px 16px 28px; border-radius: 32px; }
            .header h1 { font-size: 22px; }
            .controls { padding: 14px 16px; gap: 10px; }
            .controls select { min-width: 80px; font-size: 13px; }
            .controls .speed-group input[type="range"] { width: 80px; }
            .controls .readtone-hint { font-size: 10px; padding: 2px 10px; white-space: normal; }
            .article-tabs button {
                flex: 0 0 calc(33.33% - 6px);
                font-size: 12px;
                padding: 8px 4px;
            }
            .article-content { font-size: 16px; padding: 18px 14px; max-height: 400px; }
            .play-controls button { font-size: 15px; padding: 14px 18px; min-width: 70px; }
            .status-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
            .top-actions button { font-size: 13px; padding: 8px 14px; }
            .article-content .sentence { padding: 4px 8px; gap: 4px; }
            .article-content .sentence .text { font-size: 16px; }
            .article-content .sentence .record-btn,
            .article-content .sentence .playback-btn { font-size: 11px; padding: 1px 4px; }
        }

        @media (max-width: 480px) {
            .article-tabs button {
                flex: 0 0 calc(50% - 5px);
                font-size: 11px;
                padding: 6px 4px;
            }
            .play-controls button { font-size: 13px; padding: 12px 12px; min-width: 60px; }
            .article-content .sentence .text { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>📖 跟讀文章</h1>
            <span class="badge" id="totalBadge">20 篇文章</span>
        </div>

        <!-- 語音控制 -->
        <div class="controls">
            <label>🎙️ 語音</label>
            <select id="voiceSelect">
                <option value="azure">☁️ Azure 自然語音 (pt-PT-FernandaNeural)</option>
                <option value="browser">🌐 瀏覽器語音 (備用)</option>
            </select>
            <span class="voice-status fixed" id="voiceStatus">✅ Azure 已選</span>

            <div class="speed-group">
                <label>🐢</label>
                <input type="range" id="speedSlider" min="0.4" max="1.8" step="0.05" value="0.85">
                <span class="speed-val" id="speedDisplay">0.85</span>
                <label>🐇</label>
            </div>
            <span class="readtone-hint">💡 選擇 Azure 語音可獲得自然發音</span>
        </div>

        <!-- 頂部功能按鈕 -->
        <div class="top-actions">
            <button class="btn-toggle" id="toggleMaskBtn">🔒 遮擋葡語</button>
            <button class="btn-show-all" id="showAllBtn">🔓 全部顯示</button>
            <button class="btn-hide-all" id="hideAllBtn">🔒 全部遮擋</button>
        </div>

        <!-- 文章標籤 -->
        <div class="article-tabs" id="articleTabs"></div>

        <!-- 播放控制 -->
        <div class="play-controls">
            <button class="btn-play" id="playBtn">▶️ 播放全部</button>
            <button class="btn-pause" id="pauseBtn" disabled>⏸️ 暫停</button>
            <button class="btn-resume" id="resumeBtn" disabled>▶️ 繼續</button>
        </div>

        <!-- 進度條 -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 文章內容 -->
        <div class="article-content" id="articleContent">
            <div style="text-align:center;padding:60px 20px;color:#8f7a66;font-size:18px;">
                ⏳ 載入中...
            </div>
        </div>

        <!-- 狀態欄 -->
        <div class="status-bar">
            <span class="status-text" id="statusText">🔊 點擊葡語句子播放，或按「播放全部」</span>
            <span class="status-position" id="statusPosition">句子 0 / 0</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>

            // ============================================================

            let useAzure = true; // 預設使用 Azure

            // ============================================================
            voiceSelect.addEventListener('change', function() {
                useAzure = this.value === 'azure';
                if (useAzure) {
                    voiceStatus.textContent = '✅ Azure 已選';
                    voiceStatus.className = 'voice-status fixed';

                    voiceStatus.textContent = '🌐 瀏覽器語音 (備用)';
                    voiceStatus.className = 'voice-status fixed';
                }
                showToast(`🔊 已切換至 ${useAzure ? 'Azure 自然語音' : '瀏覽器語音'}`);
            });

            // ============================================================
            // 5. 語速控制
            // ============================================================
            speedSlider.addEventListener('input', function() {
                speechRate = parseFloat(this.value);
                speedDisplay.textContent = speechRate.toFixed(2);
            });

            // ============================================================
            // 6. 核心語音函數 (Azure + 瀏覽器備用)
            // ============================================================
            function speakText(text, callback) {
                if (!text) {
                    if (callback) callback();
                    return;
                }
                let clean = text.replace(/[“”"']/g, '').trim();
                if (!clean) {
                    if (callback) callback();
                    return;
                }

                // 如果選擇 Azure 語音，使用代理
                if (useAzure) {
                    speakWithAzure(clean, callback);
                } else {
                    speakWithBrowser(clean, callback);
                }
            }

            // --- Azure TTS (透過 Vercel 代理) ---
            function speakWithAzure(text, callback) {
                fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        voice: 'pt-PT-FernandaNeural',
                        rate: speechRate
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error || 'Azure 請求失敗'); });
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data.success || !data.audio) {
                        throw new Error(data.error || 'Azure 回傳資料錯誤');
                    }
                    // 將 base64 轉為音訊 blob 並播放
                    const audioBlob = base64ToBlob(data.audio, 'audio/mp3');
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    audio.onended = function() {
                        URL.revokeObjectURL(audioUrl);
                        if (callback) callback();
                    };
                    audio.onerror = function() {
                        URL.revokeObjectURL(audioUrl);
                        showToast('⚠️ Azure 語音播放失敗，請檢查網路');
                        if (callback) callback();
                    };
                })
                .catch(error => {
                    console.error('Azure TTS 錯誤:', error);
                    showToast(`⚠️ Azure 錯誤: ${error.message}，改用瀏覽器語音`);
                    // 失敗時自動降級到瀏覽器語音
                    speakWithBrowser(text, callback);
                });
            }

            // --- 瀏覽器語音 (備用) ---
            function speakWithBrowser(text, callback) {
                if (currentUtterance) {
                    window.speechSynthesis.cancel();
                    currentUtterance = null;
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-PT';
                utterance.rate = speechRate;
                utterance.pitch = 1;

                utterance.onend = function() {
                    currentUtterance = null;
                    if (callback) callback();
                };
                utterance.onerror = function() {
                    currentUtterance = null;
                    if (!isCancelled && callback) {
                        callback();
                    }
                };

                currentUtterance = utterance;
                window.speechSynthesis.speak(utterance);
            }

            // --- base64 轉 Blob ---
            function base64ToBlob(base64, mimeType) {
                const byteCharacters = atob(base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                return new Blob([byteArray], { type: mimeType });
            }
