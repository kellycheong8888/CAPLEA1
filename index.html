<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📖 CAPLE · 葡語 A1-B2</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VB5QDP8LX9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-VB5QDP8LX9');

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0ece6;
            min-height: 100vh;
            padding: 24px;
            padding-top: 30px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 36px 32px 40px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #2d2a24; }
        .header .badge { background: #e8e4de; padding: 8px 22px; border-radius: 30px; font-size: 14px; font-weight: 500; color: #3d352c; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e8e4de; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-bar button { border: none; background: transparent; padding: 10px 22px; border-radius: 30px; font-size: 15px; font-weight: 600; color: #5f5346; cursor: pointer; transition: 0.2s; }
        .tab-bar button:hover { background: #f0ece6; }
        .tab-bar button.active { background: #2d2a24; color: #ffffff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 22px;
            background: #f5f2ed;
            border-radius: 24px;
            align-items: center;
        }
        .controls label { font-size: 14px; font-weight: 500; color: #5f5346; }
        .controls select { flex: 1; min-width: 180px; background: #ffffff; border: none; border-radius: 30px; padding: 8px 16px; font-size: 13px; color: #2d2a24; outline: none; cursor: pointer; }
        .controls .voice-status { font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 30px; }
        .controls .voice-status.fixed { color: #1e7b4a; background: #e6f5ed; }
        .controls .voice-status.not-fixed { color: #b13e3e; background: #f5e6e6; }
        .controls .speed-group { display: flex; align-items: center; gap: 10px; }
        .controls .speed-group input[type="range"] { width: 110px; accent-color: #8f7a66; cursor: pointer; }
        .controls .speed-group .speed-val { font-size: 15px; font-weight: 600; color: #2d2a24; min-width: 40px; text-align: center; }
        .controls .readtone-hint { font-size: 12px; color: #7a8a9a; background: #eef4fa; padding: 4px 14px; border-radius: 30px; white-space: nowrap; }

        .top-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
        .top-actions button { border: none; border-radius: 40px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 6px; }
        .top-actions button:active { transform: scale(0.95); }
        .btn-toggle { background: #2d2a24; color: #ffffff; }
        .btn-toggle:hover { background: #1f1b16; }
        .btn-toggle.unmask { background: #2d7a4a; }
        .btn-toggle.unmask:hover { background: #1f5f3a; }
        .btn-show-all { background: #e8e4de; color: #5f5346; }
        .btn-show-all:hover { background: #d5cfc7; }
        .btn-hide-all { background: #e8e4de; color: #5f5346; }
        .btn-hide-all:hover { background: #d5cfc7; }

        .category-tabs { display: flex; gap: 12px; margin-bottom: 20px; padding: 4px; }
        .category-tabs button { flex: 1; border: 2px solid #d0d8e0; border-radius: 40px; padding: 12px 18px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; background: #f5f7fa; color: #4a5a6a; }
        .category-tabs button:hover { background: #e8edf2; }
        .category-tabs button.active-a1 { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; }
        .category-tabs button.active-b1 { background: #d1fae5; border-color: #059669; color: #047857; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 16px 0 20px; flex-wrap: wrap; }
        .pagination button { border: 1px solid #d0d8e0; border-radius: 30px; padding: 6px 16px; background: transparent; font-size: 14px; font-weight: 600; color: #4a5a6a; cursor: pointer; transition: 0.15s; }
        .pagination button:hover { background: #e8edf2; }
        .pagination button.active-page { background: #2d2a24; color: #ffffff; border-color: #2d2a24; }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination .page-info { font-size: 14px; color: #6b7a8a; padding: 0 8px; }

        .article-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 48px; }
        .article-tabs button { flex: 0 0 calc(20% - 8px); min-width: 0; padding: 10px 6px; border: 2px solid #e0d8cf; border-radius: 40px; background: transparent; font-size: 13px; font-weight: 600; color: #5f5346; cursor: pointer; transition: 0.15s; text-align: center; line-height: 1.3; word-break: break-word; white-space: normal; }
        .article-tabs button:active { transform: scale(0.96); }
        .article-tabs button.active { background: #2d2a24; color: #ffffff; border-color: #2d2a24; }
        .article-tabs button .icon { font-size: 14px; }
        .article-tabs button .zh-label { display: block; font-size: 10px; font-weight: 400; color: #8a7e72; margin-top: 2px; }
        .article-tabs button.active .zh-label { color: #c5b8a8; }

        .play-controls { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
        .play-controls button { border: none; border-radius: 50px; padding: 16px 32px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.15s; flex: 1; min-width: 100px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .play-controls button:active { transform: scale(0.95); }
        .btn-play { background: #2d2a24; color: #ffffff; }
        .btn-play:active { background: #1f1b16; }
        .btn-play.playing { background: #b15e4a; }
        .btn-pause { background: #e8e4de; color: #5f5346; }
        .btn-pause:active { background: #d5cfc7; }
        .btn-pause:disabled { opacity: 0.4; pointer-events: none; }
        .btn-resume { background: #2d7a4a; color: #ffffff; }
        .btn-resume:active { background: #1f5f3a; }
        .btn-resume:disabled { opacity: 0.4; pointer-events: none; }

        .progress-wrap { background: #ede8e2; border-radius: 30px; height: 8px; margin-bottom: 18px; overflow: hidden; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: #8f7a66; border-radius: 30px; transition: width 0.2s; }

        .article-content {
            background: #fcf9f6;
            border-radius: 28px;
            padding: 28px 24px;
            border: 1px solid #f0ebe5;
            min-height: 380px;
            max-height: 540px;
            overflow-y: auto;
            line-height: 2;
            font-size: 18px;
            color: #1f1b16;
        }
        .article-content::-webkit-scrollbar { width: 6px; }
        .article-content::-webkit-scrollbar-track { background: #f0ece6; border-radius: 10px; }
        .article-content::-webkit-scrollbar-thumb { background: #c5b8a8; border-radius: 10px; }

        .sentence {
            margin-bottom: 3px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .sentence:hover { background: #eef4fa; }
        .sentence.highlight { background: #faf0e0; padding: 8px 16px; border-left: 4px solid #b3a394; }
        .sentence .label { font-size: 12px; color: #b3a394; font-weight: 600; margin-right: 4px; }
        .sentence .text { color: #1f1b16; cursor: pointer; flex: 1; font-size: 18px; min-width: 60px; }
        .sentence .text.zh-text { color: #5f5346; cursor: default; }
        .sentence .text.pt-text { cursor: pointer; transition: 0.2s; padding: 2px 4px; border-radius: 4px; }
        .sentence .text.pt-text:hover { text-decoration: underline; color: #1a3a5c; }
        .sentence .text.pt-text.masked { background: #2d2a24; color: #2d2a24 !important; border-radius: 4px; padding: 2px 8px; cursor: pointer; user-select: none; transition: 0.15s; text-decoration: none !important; }
        .sentence .text.pt-text.masked:hover { background: #4a4440; }

        .sentence-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
            width: 100%;
            padding-left: 28px;
        }
        .sentence-actions button {
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sentence-actions button:active { transform: scale(0.95); }
        .btn-play-icon { background: #e1ecf5; color: #003753; }
        .btn-play-icon:hover { background: #cde0ef; }
        .btn-record { background: #fce7f3; color: #9d174d; }
        .btn-record:hover { background: #fbcfe8; }
        .btn-record.recording { background: #b14a4a; color: white; animation: blink 0.8s infinite; }
        .btn-playback { background: #e0e7ff; color: #3730a3; }
        .btn-playback:hover { background: #c7d2fe; }
        .btn-playback:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-score { background: #fef3c7; color: #b45309; }
        .btn-score:hover { background: #fde68a; }
        .btn-score:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .score-result {
            margin-top: 6px;
            padding: 8px 16px;
            border-radius: 12px;
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            display: none;
            font-size: 14px;
            line-height: 1.8;
            width: 100%;
        }
        .score-result.show { display: block; }
        .score-result .score-number { font-size: 20px; font-weight: 700; color: #16a34a; }
        .score-result .score-feedback { color: #374151; margin-top: 4px; }
        .score-result .score-feedback .correct { color: #16a34a; }
        .score-result .score-feedback .improve { color: #dc2626; }
        .score-result .score-demo { margin-top: 6px; padding: 6px 12px; background: #eef2ff; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .record-status { font-size: 11px; color: #8f7a66; margin-left: 4px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 12px 18px;
            background: #f5f2ed;
            border-radius: 30px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-text { font-size: 14px; color: #5f5346; flex: 1; }
        .status-position { font-size: 13px; color: #8f7a66; font-weight: 500; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2a24;
            color: #f5f1eb;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .toast.show { opacity: 1; }

        .history-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .history-stats .stat-card { background: #f5f7fa; padding: 14px 16px; border-radius: 16px; text-align: center; }
        .history-stats .stat-card .stat-number { font-size: 24px; font-weight: 700; color: #2d2a24; }
        .history-stats .stat-card .stat-label { font-size: 12px; color: #6b7a8a; }
        .history-list { max-height: 350px; overflow-y: auto; }
        .history-list .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #e8e4de; font-size: 14px; flex-wrap: wrap; gap: 6px; }
        .history-list .history-item .h-date { color: #6b7a8a; font-size: 12px; }
        .history-list .history-item .h-score { font-weight: 700; color: #16a34a; }
        .history-list .history-item .h-type { background: #e8e4de; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .history-list .history-item .h-view { color: #2563eb; cursor: pointer; font-weight: 600; font-size: 12px; }
        .history-list .history-item .h-view:hover { text-decoration: underline; }
        .history-clear-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; margin-top: 12px; }
        .history-clear-btn:hover { background: #b91c1c; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .app { padding: 20px 16px 28px; border-radius: 32px; }
            .header h1 { font-size: 22px; }
            .controls { padding: 14px 16px; gap: 10px; }
            .controls select { min-width: 120px; font-size: 12px; }
            .controls .speed-group input[type="range"] { width: 80px; }
            .controls .readtone-hint { font-size: 10px; padding: 2px 10px; white-space: normal; }
            .category-tabs button { font-size: 14px; padding: 10px 12px; }
            .article-tabs button { flex: 0 0 calc(33.33% - 6px); font-size: 12px; padding: 8px 4px; }
            .article-content { font-size: 16px; padding: 18px 14px; max-height: 400px; }
            .play-controls button { font-size: 15px; padding: 14px 18px; min-width: 70px; }
            .status-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
            .top-actions button { font-size: 13px; padding: 8px 14px; }
            .sentence { padding: 4px 8px; gap: 4px; }
            .sentence .text { font-size: 16px; }
            .sentence-actions { padding-left: 8px; }
            .sentence-actions button { font-size: 11px; padding: 3px 10px; }
            .tab-bar button { font-size: 13px; padding: 8px 14px; }
            .history-stats { grid-template-columns: repeat(2, 1fr); }
            .pagination button { font-size: 12px; padding: 4px 12px; }
            .pagination .page-info { font-size: 12px; }
        }
        @media (max-width: 480px) {
            .article-tabs button { flex: 0 0 calc(50% - 5px); font-size: 11px; padding: 6px 4px; }
            .play-controls button { font-size: 13px; padding: 12px 12px; min-width: 60px; }
            .sentence .text { font-size: 15px; }
            .category-tabs { flex-direction: column; gap: 6px; }
            .category-tabs button { font-size: 13px; padding: 8px 12px; }
            .tab-bar { gap: 4px; }
            .tab-bar button { font-size: 12px; padding: 6px 10px; }
            .history-stats { grid-template-columns: 1fr 1fr; }
            .pagination button { font-size: 11px; padding: 3px 10px; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>📖 葡語學習</h1>
            <span class="badge" id="totalBadge">70 篇文章</span>
        </div>

        <div class="controls">
            <label>🎙️ 語音</label>
            <select id="voiceSelect">
                <option value="pt-PT-FernandaNeural">🇵🇹 Fernanda (女聲) - 標準</option>
                <option value="pt-PT-RaquelNeural">🇵🇹 Raquel (女聲) - 自然</option>
                <option value="pt-PT-DuarteNeural">🇵🇹 Duarte (男聲) - 沈穩</option>
                <option value="pt-BR-FranciscaNeural">🇧🇷 Francisca (女聲) - 巴西</option>
                <option value="pt-BR-AntonioNeural">🇧🇷 Antonio (男聲) - 巴西</option>
                <option value="browser">🌐 瀏覽器語音 (備用)</option>
            </select>
            <span class="voice-status fixed" id="voiceStatus">✅ Azure: pt-PT-FernandaNeural</span>
            <div class="speed-group">
                <label>🐢</label>
                <input type="range" id="speedSlider" min="0.4" max="1.8" step="0.05" value="0.85">
                <span class="speed-val" id="speedDisplay">0.85</span>
                <label>🐇</label>
            </div>
            <span class="readtone-hint">💡 選擇不同語音，聽聽看哪個最適合</span>
        </div>

        <div class="tab-bar" id="tabBar">
            <button class="active" data-tab="reading">📖 口語看圖説話</button>
            <button data-tab="history">📊 練習記錄</button>
        </div>

        <div class="tab-content active" id="tabReading">
            <div class="top-actions">
                <button class="btn-toggle" id="toggleMaskBtn">🔒 遮擋葡語</button>
                <button class="btn-show-all" id="showAllBtn">🔓 全部顯示</button>
                <button class="btn-hide-all" id="hideAllBtn">🔒 全部遮擋</button>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="active-a1" data-category="a1">📘 A1-A2 看圖說話（50篇）</button>
                <button data-category="b1">📗 B1-B2 看圖說話（20篇）</button>
            </div>

            <div class="pagination" id="pagination"></div>
            <div class="article-tabs" id="articleTabs"></div>

            <div class="play-controls">
                <button class="btn-play" id="playBtn">▶️ 播放全部</button>
                <button class="btn-pause" id="pauseBtn" disabled>⏸️ 暫停</button>
                <button class="btn-resume" id="resumeBtn" disabled>▶️ 繼續</button>
            </div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="article-content" id="articleContent">
                <div style="text-align:center;padding:60px 20px;color:#8f7a66;font-size:18px;">⏳ 載入中...</div>
            </div>
        </div>

        <div class="tab-content" id="tabHistory">
            <div id="historyContainer">
                <div class="history-stats" id="historyStats">
                    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">總練習次數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statAvg">-</div><div class="stat-label">平均分數</div></div>
                    <div class="stat-card"><div class="stat-number" id="statHigh">-</div><div class="stat-label">最高分</div></div>
                    <div class="stat-card"><div class="stat-number" id="statLow">-</div><div class="stat-label">最低分</div></div>
                </div>
                <div class="history-list" id="historyList">
                    <div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>
                </div>
                <button class="history-clear-btn" id="clearHistoryBtn">🗑️ 清除所有記錄</button>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-text" id="statusText">🔊 點擊葡語句子播放，或按「播放全部」</span>
            <span class="status-position" id="statusPosition">句子 0 / 0</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ================================================================
    // 1. 文章數據 (70篇)
    // ================================================================

    // ---- A1-A2 看圖說話 (50篇) ----
    const ARTICLES_A1 = [        // 1. 浴室
        {
            id: 'a1_1',
            title: 'Casa de banho',
            titleZh: '浴室',
            icon: '🛁',
            sentences: [
                { text: 'Nesta imagem, vejo uma casa de banho moderna e funcional.', type: 'pt' },
                { text: '在這張圖片裡，我看到一間現代且實用的浴室。', type: 'zh' },
                { text: 'A banheira está ao lado da janela.', type: 'pt' },
                { text: '浴缸在窗戶旁邊。', type: 'zh' },
                { text: 'Ao lado da banheira, está o tapete.', type: 'pt' },
                { text: '浴缸旁邊有地毯。', type: 'zh' },
                { text: 'A sanita está ao lado do bidé.', type: 'pt' },
                { text: '馬桶在坐浴盆旁邊。', type: 'zh' },
                { text: 'O lavatório está em frente ao espelho.', type: 'pt' },
                { text: '洗手台在鏡子前面。', type: 'zh' },
                { text: 'O esquentador está pendurado na parede.', type: 'pt' },
                { text: '熱水器掛在牆上。', type: 'zh' },
                { text: 'A máquina de lavar roupa está ao lado da porta.', type: 'pt' },
                { text: '洗衣機在門旁邊。', type: 'zh' },
                { text: 'A casa de banho é pequena mas está muito limpa e arrumada.', type: 'pt' },
                { text: '浴室雖小，但非常乾淨整潔。', type: 'zh' }
            ]
        },
        // 2. 廚房
        {
            id: 'a1_2',
            title: 'Cozinha',
            titleZh: '廚房',
            icon: '🍳',
            sentences: [
                { text: 'Nesta imagem, vejo uma cozinha moderna e bem equipada.', type: 'pt' },
                { text: '在這張圖片裡，我看到一間現代且設備齊全的廚房。', type: 'zh' },
                { text: 'O fogão e o forno estão ao lado da janela.', type: 'pt' },
                { text: '爐灶和烤箱在窗戶旁邊。', type: 'zh' },

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { el.classList.remove('show'); }, 2000);
    }
    let toastTimeout = null;

    function base64ToBlob(base64, mimeType) {
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
    }

    function getCurrentArticles() { return ALL_ARTICLES[currentCategory] || []; }
    function getCurrentArticle() {

    function stopSpeaking() {
        if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }

    // ================================================================
    // 4. 語音函數
    // ================================================================

    function speakText(text, callback) {
        if (!text) { if (callback) callback(); return; }
        let clean = text.replace(/[“”"']/g, '').trim();
        if (!clean) { if (callback) callback(); return; }
        if (useAzure) {
            speakWithAzure(clean, callback);
        } else {
            speakWithBrowser(clean, callback);
        }
    }

    function speakWithAzure(text, callback) {
        fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-proxy-secret': PROXY_SECRET },
            body: JSON.stringify({ action: 'tts', text: text, voice: currentAzureVoice || 'pt-PT-FernandaNeural', rate: speechRate })
        })
        .then(response => {
            if (!response.ok) { return response.json().then(err => { throw new Error(err.error || 'Azure 請求失敗'); }); }
            return response.json();
        })
        .then(data => {
            if (!data.success || !data.audio) throw new Error(data.error || 'Azure 回傳資料錯誤');
            const audioBlob = base64ToBlob(data.audio, 'audio/mp3');
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play();
            audio.onended = function() { URL.revokeObjectURL(audioUrl); if (callback) callback(); };
            audio.onerror = function() { URL.revokeObjectURL(audioUrl); showToast('⚠️ Azure 語音播放失敗'); if (callback) callback(); };
        })
        .catch(error => {
            console.error('Azure TTS 錯誤:', error);
            showToast('⚠️ Azure 錯誤，改用瀏覽器語音');
            speakWithBrowser(text, callback);
        });
    }

    function speakWithBrowser(text, callback) {
        if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-PT';
        utterance.rate = speechRate;
        utterance.pitch = 1;
        utterance.onend = function() { currentUtterance = null; if (callback) callback(); };
        utterance.onerror = function() { currentUtterance = null; if (!isCancelled && callback) callback(); };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // ================================================================
    // 5. Azure Speech-to-Text (用於發音評分)
    // ================================================================

    async function sttWithProxy(audioBase64) {
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-proxy-secret': PROXY_SECRET },
            body: JSON.stringify({ action: 'stt', sttAudio: audioBase64 })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'STT 請求失敗');
        }

        const data = await response.json();
        return data.text || '';
    }

    // ================================================================
    // 7. 跟讀文章渲染

    function renderTabs() {
        const articles = getCurrentArticles();
        const totalPages = Math.ceil(articles.length / ITEMS_PER_PAGE);
        if (currentPage > totalPages) currentPage = totalPages || 1;
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = Math.min(start + ITEMS_PER_PAGE, articles.length);
        const pageArticles = articles.slice(start, end);

        let html = '';
        pageArticles.forEach((article, idx) => {
            const globalIdx = start + idx;
            const active = globalIdx === currentArticleIndex ? 'active' : '';
            html += `<button class="${active}" data-index="${globalIdx}">
                        <span class="icon">${article.icon}</span> ${article.title}
                        <span class="zh-label">${article.titleZh}</span>
                    </button>`;
        });
        articleTabs.innerHTML = html;

        document.querySelectorAll('.article-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.index);
                if (idx !== currentArticleIndex) {
                    stopSpeaking();
                    isMasked = false;
                    toggleMaskBtn.textContent = '🔒 遮擋葡語';
                    toggleMaskBtn.classList.remove('unmask');
                    renderArticle(idx);
                    const articles2 = getCurrentArticles();
                    showToast(`📖 已切換到 ${articles2[idx].icon} ${articles2[idx].title}`);
                }
            });
        });

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = '';
        html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>◀ 上一頁</button>`;

        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="${i === currentPage ? 'active-page' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }

        html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一頁 ▶</button>`;
        html += `<span class="page-info">第 ${currentPage} / ${totalPages} 頁</span>`;

        container.innerHTML = html;
    }

    window.goToPage = function(page) {
        const articles = getCurrentArticles();
        const totalPages = Math.ceil(articles.length / ITEMS_PER_PAGE);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        const newIndex = (page - 1) * ITEMS_PER_PAGE;
        if (newIndex !== currentArticleIndex) {
            currentArticleIndex = newIndex;
            renderArticle(newIndex);
        } else {
            renderTabs();
        }
    };

    function renderCategoryTabs() {
        const btns = categoryTabs.querySelectorAll('button');
        btns.forEach(btn => {
            btn.classList.remove('active-a1', 'active-b1');
            if (btn.dataset.category === 'a1' && currentCategory === 'a1') {

            } else if (btn.dataset.category === 'b1' && currentCategory === 'b1') {
                btn.classList.add('active-b1');

    function renderArticle(index) {

        const article = articles[index];

            articleContent.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#b15e4a;font-size:18px;">⚠️ 文章數據錯誤</div>';

                html += `<button class="btn-score score-btn" data-key="${key}" data-index="${idx}" data-text="${item.text}" ${!hasRecording ? 'disabled' : ''}>⭐ 評分</button>`;

        articleContent.innerHTML = html;
        currentArticleIndex = index;
        currentSentenceIndex = 0;
        isPlaying = false;
        isPaused = false;
        isFinished = false;
        isCancelled = false;

    function updateHighlight() {
        const sentences = articleContent.querySelectorAll('.sentence');
        sentences.forEach((el, idx) => {
            el.classList.toggle('highlight', idx === currentSentenceIndex);
        });
        if (sentences[currentSentenceIndex]) {
            sentences[currentSentenceIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function updateStatus() {
        const article = getCurrentArticle();
        if (!article) return;
        const total = article.sentences.length;
        const pct = Math.round((currentSentenceIndex / total) * 100);
        progressBar.style.width = Math.min(pct, 100) + '%';
        let msg = '';
        if (isFinished) msg = '✅ 全部播放完成！點擊「播放全部」重新開始';
        else if (isPlaying) msg = `🔊 播放中... 句子 ${currentSentenceIndex + 1} / ${total}`;
        else if (isPaused) msg = `⏸️ 已暫停 — 句子 ${currentSentenceIndex + 1} / ${total}`;
        else msg = `📖 句子 ${currentSentenceIndex + 1} / ${total} — 點擊葡語句子播放，或按「播放全部」`;
        statusText.textContent = msg;
        statusPosition.textContent = `句子 ${currentSentenceIndex + 1} / ${total}`;
    }

    function updateButtons() {
        if (isFinished) {
            playBtn.textContent = '▶️ 重新播放';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            return;

            playBtn.textContent = '🔊 播放中...';

            pauseBtn.disabled = false;
            resumeBtn.disabled = true;

            playBtn.textContent = '▶️ 繼續';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;

            playBtn.textContent = '▶️ 播放全部';
            playBtn.classList.remove('playing');
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
        }
    }

    // ================================================================
    // 8. 播放邏輯
    // ================================================================

    function playSingleSentence(index) {
        const article = getCurrentArticle();
        if (!article || index >= article.sentences.length) return;
        const item = article.sentences[index];
        if (item.type !== 'pt') { showToast('⚠️ 只能播放葡語句子'); return; }
        stopSpeaking();
        isPlaying = false;
        isPaused = false;
        isCancelled = false;
        isSinglePlay = true;
        currentSentenceIndex = index;
        updateStatus();
        updateHighlight();
        updateButtons();
        speakText(item.text, function() {
            isSinglePlay = false;
            isPlaying = false;
            updateStatus();
            updateButtons();
            showToast('✅ 播放完成');
        });
    }

    function startPlaying() {
        const article = getCurrentArticle();
        if (!article) return;
        if (currentSentenceIndex >= article.sentences.length) currentSentenceIndex = 0;
        isPlaying = true;
        isPaused = false;
        isFinished = false;
        isCancelled = false;
        isSinglePlay = false;
        updateStatus();
        updateButtons();
        speakNextSentence(currentSentenceIndex);
    }

    function speakNextSentence(index) {
        if (isCancelled) { isCancelled = false; return; }
        const article = getCurrentArticle();
        if (!article) return;
        if (index >= article.sentences.length) {
            isPlaying = false;
            isPaused = false;
            isFinished = true;
            isSinglePlay = false;
            progressBar.style.width = '100%';
            updateStatus();
            updateButtons();
            showToast('✅ 全部播放完成！');
            return;
        }
        currentSentenceIndex = index;
        const item = article.sentences[index];
        updateStatus();
        updateHighlight();
        updateButtons();
        if (item.type === 'pt') {
            speakText(item.text, function() {
                if (isCancelled) { isCancelled = false; return; }
                if (isPlaying && !isPaused) {
                    timeoutId = setTimeout(function() { speakNextSentence(index + 1); }, 200);
                }
            });
        } else {
            if (isPlaying && !isPaused) {
                timeoutId = setTimeout(function() { speakNextSentence(index + 1); }, 100);
            }
        }
    }

    function handlePlay() {
        const article = getCurrentArticle();
        if (!article) return;
        if (isFinished) { currentSentenceIndex = 0; isFinished = false; isPaused = false; isPlaying = false; isCancelled = false; isSinglePlay = false; startPlaying(); return; }
        if (isPaused) { isCancelled = false; isPaused = false; isPlaying = true; isFinished = false; isSinglePlay = false; updateStatus(); updateButtons(); speakNextSentence(currentSentenceIndex); return; }
        if (isPlaying) return;
        if (currentSentenceIndex >= article.sentences.length) currentSentenceIndex = 0;
        isCancelled = false;
        isSinglePlay = false;
        startPlaying();
    }

    function handlePause() {
        if (isPlaying) { isPaused = true; isPlaying = false; stopSpeaking(); updateStatus(); updateButtons(); showToast('⏸️ 已暫停'); }
    }

    function handleResume() {
        if (isPaused) { isCancelled = false; isPaused = false; isPlaying = true; isFinished = false; isSinglePlay = false; updateStatus(); updateButtons(); speakNextSentence(currentSentenceIndex); showToast('▶️ 繼續播放'); }
    }

    // ================================================================
    // 9. 事件綁定
    // ================================================================

    function bindEvents() {
        document.querySelectorAll('#articleContent .sentence .text.pt-text').forEach(el => {
            el.addEventListener('click', function(e) {
                if (isMasked) { this.classList.toggle('masked'); this.classList.toggle('unmasked'); return; }
                const idx = parseInt(this.dataset.index);
                const article = getCurrentArticle();
                if (!article) return;
                const sentence = article.sentences[idx];
                if (sentence.type === 'pt') {
                    if (isPlaying && !isSinglePlay) { stopSpeaking(); isPlaying = false; isPaused = false; }
                    playSingleSentence(idx);
                }
            });
        });

        document.querySelectorAll('#articleContent .play-icon').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const idx = parseInt(this.dataset.index);
                const article = getCurrentArticle();
                if (!article) return;
                const sentence = article.sentences[idx];
                if (sentence.type === 'pt') {
                    if (isPlaying && !isSinglePlay) { stopSpeaking(); isPlaying = false; isPaused = false; }
                    playSingleSentence(idx);
                }
            });
        });

        document.querySelectorAll('#articleContent .record-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = this.dataset.key;
                const idx = parseInt(this.dataset.index);
                toggleRecording(this, key, idx);
            });
        });

        document.querySelectorAll('#articleContent .playback-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = this.dataset.key;
                playRecording(key);
            });
        });
    }

    // ================================================================
    // 10. 錄音功能（優先 WAV，備用 MediaRecorder）
    // ================================================================

    let mediaStream = null;
    let isRecording = false;
    let audioContext = null;
    let pcmData = [];
    let recordingStartTime = 0;
    let useWavRecording = true;

    function toggleRecording(btn, key, index) {
        if (isRecording) {
            stopRecording(btn, key);
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showToast('⚠️ 此瀏覽器不支援錄音功能');
            return;
        }

        startWavRecording(btn, key);
    }

    function startWavRecording(btn, key) {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaStream = stream;
                isRecording = true;
                recordingStartTime = Date.now();
                btn.textContent = '⏹ 停止';
                btn.classList.add('recording');
                showToast('🎙 錄音中 (WAV)...');

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                pcmData = [];

                                     processor.onaudioprocess = function(e) {
                    if (!isRecording) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(inputData.length);
                    // 音量增益係數 2.5 倍（讓錄音本身更大聲）
                    const gain = 2.5;
                    for (let i = 0; i < inputData.length; i++) {
                        let s = Math.max(-1, Math.min(1, inputData[i]));
                        s = s * gain;
                        s = Math.max(-1, Math.min(1, s));  // 防止爆音
                        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    pcmData.push(pcm);
                };

                source.connect(processor);
                processor.connect(audioContext.destination);
                btn._processor = { source, processor, context: audioContext };
            })
            .catch(err => {
                console.warn('WAV 錄音失敗，切換到 MediaRecorder:', err);
                useWavRecording = false;
                startMediaRecorderRecording(btn, key);
            });
    }

    function startMediaRecorderRecording(btn, key) {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaStream = stream;
                isRecording = true;
                recordingStartTime = Date.now();
                btn.textContent = '⏹ 停止';
                btn.classList.add('recording');
                showToast('🎙 錄音中 (備用)...');

                const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'];
                let mimeType = 'audio/webm';
                for (const type of mimeTypes) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        mimeType = type;
                        break;
                    }
                }

                const recorder = new MediaRecorder(stream, { mimeType });
                const chunks = [];

                recorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    if (blob.size < 2000) {
                        showToast('⚠️ 錄音檔案太小，請重新錄製');
                        cleanupRecording();
                        return;
                    }
                    saveRecording(blob, btn, key, mimeType);
                };

                recorder.start(100);
                btn._recorder = recorder;
            })
            .catch(err => {
                showToast('⚠️ 無法存取麥克風: ' + err.message);
            });
    }

    function stopRecording(btn, key) {
        isRecording = false;
        btn.textContent = '🎙 錄音';
        btn.classList.remove('recording');

        if (btn._recorder && btn._recorder.state === 'recording') {
            try {
                btn._recorder.stop();
            } catch (e) {}
            btn._recorder = null;
            cleanupRecording();
            return;
        }

        if (btn._processor) {
            try {
                const { source, processor, context } = btn._processor;
                processor.disconnect();
                source.disconnect();
                if (context && context.state !== 'closed') {
                    context.close();
                }
            } catch (e) {}
            btn._processor = null;
        }

        const duration = (Date.now() - recordingStartTime) / 1000;
        if (duration < 1.5) {
            showToast('⚠️ 錄音太短，請說完整句子');
            cleanupRecording();
            return;
        }

        if (!pcmData || pcmData.length === 0) {
            showToast('⚠️ 沒有錄到聲音，請重新錄製');
            cleanupRecording();
            return;
        }

        const totalSamples = pcmData.reduce((sum, arr) => sum + arr.length, 0);
        const pcmBuffer = new Int16Array(totalSamples);
        let offset = 0;
        for (const arr of pcmData) {
            pcmBuffer.set(arr, offset);
            offset += arr.length;
        }

        const wavBlob = createWavBlob(pcmBuffer, audioContext ? audioContext.sampleRate : 16000);
        if (!wavBlob || wavBlob.size < 2000) {
            showToast('⚠️ 錄音檔案太小，請重新錄製');
            cleanupRecording();
            return;
        }

        saveRecording(wavBlob, btn, key, 'audio/wav');
    }

    function cleanupRecording() {
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
        pcmData = [];
        isRecording = false;
    }

    function createWavBlob(pcmData, sampleRate) {
        try {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length * (bitsPerSample / 8);

            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            const offset = 44;
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(offset + i * 2, pcmData[i], true);
            }

            return new Blob([buffer], { type: 'audio/wav' });
        } catch (e) {
            console.error('創建 WAV 失敗:', e);
            return null;
        }
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }

    function saveRecording(blob, btn, key, mimeType) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const base64 = e.target.result.split(',')[1];
                localStorage.setItem(key, base64);
                localStorage.setItem(key + '_type', mimeType);
                
                const pb = btn.parentElement.querySelector('.playback-btn');
                if (pb) pb.disabled = false;
                const sb = btn.parentElement.querySelector('.score-btn');
                if (sb) sb.disabled = false;
                
                let status = btn.parentElement.querySelector('.record-status');
                if (!status) {
                    status = document.createElement('span');
                    status.className = 'record-status';
                    btn.parentElement.appendChild(status);
                }
                status.textContent = '✅';
                
                cleanupRecording();
                showToast('✅ 錄音已儲存！');
            } catch (err) {
                showToast('⚠️ 錄音儲存失敗');
            }
        };
        reader.readAsDataURL(blob);
    }

               function playRecording(key) {
        const data = localStorage.getItem(key);
        if (!data) { 
            showToast('⚠️ 沒有錄音'); 
            return; 
        }
        try {
            const mimeType = localStorage.getItem(key + '_type') || 'audio/wav';
            const blob = base64ToBlob(data, mimeType);
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            
            // 🔊 音量最大值為 1.0（瀏覽器限制）
            audio.volume = 1.0;
            
            audio.play().catch(e => {
                console.error('播放失敗:', e);
                showToast('⚠️ 播放失敗，請重新錄音');
            });
            
            audio.onended = () => { 
                URL.revokeObjectURL(url); 
                showToast('✅ 播放完成');
            };
            
            audio.onerror = (e) => {
                console.error('音訊錯誤:', e);
                showToast('⚠️ 播放失敗');
                URL.revokeObjectURL(url);
            };
            
            showToast('🔊 播放中...');
        } catch (e) {
            console.error('播放錯誤:', e);
            showToast('⚠️ 播放失敗');
        }
    }

    function downloadRecording(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recording_${Date.now()}.wav`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function calculateSimilarity(str1, str2) {
        const words1 = str1.split(/\s+/).filter(w => w.length > 2);
        const words2 = str2.split(/\s+/).filter(w => w.length > 2);
        if (words1.length === 0 || words2.length === 0) return 0;
        const common = words1.filter(w => words2.includes(w));
        const union = new Set([...words1, ...words2]);
        return common.length / union.size;
    }

        async function handleScore(key, text, index) {
        console.log('⭐ 評分按鈕被點擊！');
        console.log('📝 原句:', text);
        console.log('🌐 瀏覽器資訊:', navigator.userAgent);
        
        const article = getCurrentArticle();
        if (!article) {
            console.error('❌ 找不到文章');
            showToast('⚠️ 找不到文章');
            return;
        }
        
        const scoreResult = document.getElementById(`scoreResult_${article.id}_${index}`);
        if (!scoreResult) {
            console.error('❌ 找不到評分區域');
            showToast('⚠️ 評分區域錯誤');
            return;
        }

        const data = localStorage.getItem(key);
        if (!data) {
            showToast('⚠️ 請先錄音再評分');
            return;
        }
        
        console.log('📦 錄音資料長度:', data.length);
        console.log('📦 錄音資料前 50 字元:', data.substring(0, 50));

        scoreResult.className = 'score-result show';
        scoreResult.innerHTML = '<div style="color:#6b7a8a;">⏳ AI 正在分析發音...</div>';

        try {
            console.log('📤 準備發送 STT 請求...');
            console.log('📤 Proxy URL:', PROXY_URL);
            
            // 測試 Proxy 是否可達
            try {
                const testResponse = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'x-proxy-secret': PROXY_SECRET 
                    },
                    body: JSON.stringify({ action: 'ping' })
                });
                const testData = await testResponse.json();
                console.log('📥 Proxy 測試回應:', testResponse.status, testData);
            } catch (testError) {
                console.error('❌ Proxy 無法連線:', testError);
                scoreResult.innerHTML = `<div style="color:#dc2626;">⚠️ 無法連線到語音伺服器，請檢查網路</div>`;
                return;
            }

            const userText = await sttWithProxy(data);
            console.log('📥 STT 結果:', userText);
            console.log('📥 STT 結果長度:', userText ? userText.length : 0);

            if (!userText || userText.trim() === '') {
                scoreResult.innerHTML = `<div style="color:#dc2626;">⚠️ 無法辨識語音，請確保麥克風清晰並重新錄音<br>
                <span style="font-size:12px;color:#6b7a8a;">提示：檢查麥克風權限，或嘗試在無痕模式中測試</span></div>`;
                return;
            }

            const similarity = calculateSimilarity(text.toLowerCase(), userText.toLowerCase());
            const score = Math.min(Math.round(similarity * 9 + 1), 10);

            let feedbackHtml = '';
            if (score >= 8) {
                feedbackHtml = '<div style="color:#16a34a;">✅ 發音非常清晰，接近母語者！</div>';
            } else if (score >= 6) {
                feedbackHtml = '<div style="color:#f59e0b;">⚠️ 發音大致正確，部分單詞需改進</div>';
            } else if (score >= 4) {
                feedbackHtml = '<div style="color:#f97316;">🔴 發音需要加強，建議多跟讀練習</div>';
            } else {
                feedbackHtml = '<div style="color:#dc2626;">🔴 發音需要大幅改進，建議從基礎開始練習</div>';
            }

            scoreResult.innerHTML = `
                <div>
                    <span class="score-number">⭐ ${score}/10</span>
                    <span style="margin-left:12px;font-size:14px;color:#374151;">${feedbackHtml}</span>
                </div>
                <div class="score-feedback">
                    <div>📝 您說的是: "${userText}"</div>
                    <div>📖 原句: "${text}"</div>
                    <div style="margin-top:4px;font-size:13px;color:#6b7a8a;">💡 相似度: ${Math.round(similarity * 100)}%</div>
                </div>
                <div class="score-demo">
                    <span>🔊 標準發音示範:</span>
                    <button class="btn-play-icon" onclick="speakText('${text.replace(/'/g, "\\'")}')" style="border:none;padding:2px 12px;border-radius:20px;cursor:pointer;">▶ 播放</button>
                </div>
            `;

            saveHistory({
                type: '跟讀',
                sentence: text,
                score: score,
                feedback: userText,
                detail: []
            });

            showToast(`✅ 評分完成！分數: ${score}/10`);

        } catch (error) {
            console.error('❌ 評分錯誤:', error);
            console.error('❌ 錯誤詳情:', error.message);
            scoreResult.innerHTML = `
                <div style="color:#dc2626;">⚠️ 評分失敗: ${error.message}</div>
                <div style="margin-top:8px;font-size:14px;color:#6b7a8a;">
                    💡 請確保網路連線正常，且 Azure Speech-to-Text 服務可用
                </div>
            `;
            showToast('⚠️ 評分失敗，請稍後再試');
        }
    }

    function saveHistory(record) {
        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
        record.date = new Date().toISOString();
        history.unshift(record);
        if (history.length > 500) history.pop();
        localStorage.setItem('practiceHistory', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyContainer');
        if (!container) return;

        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');

        const total = history.length;
        const scores = history.map(h => h.score).filter(s => s !== undefined && s !== null);
        const avg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
        const high = scores.length > 0 ? Math.max(...scores) : '-';
        const low = scores.length > 0 ? Math.min(...scores) : '-';

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statAvg').textContent = avg;
        document.getElementById('statHigh').textContent = high;
        document.getElementById('statLow').textContent = low;

        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:30px;color:#8f7a66;font-size:16px;">📭 暫無練習記錄，開始練習吧！</div>';
            return;
        }

        let html = '';
        history.slice(0, 100).forEach((item, idx) => {
            const date = new Date(item.date);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
            const typeIcon = '🗣️';
            const sentencePreview = item.sentence ? (item.sentence.length > 40 ? item.sentence.substring(0, 40) + '...' : item.sentence) : '(無句子)';
            html += `
                <div class="history-item">
                    <span class="h-date">${dateStr}</span>
                    <span class="h-type">${typeIcon} 跟讀</span>
                    <span>${sentencePreview}</span>
                    <span class="h-score">${item.score || '-'}/10</span>
                    <span class="h-view" onclick="viewHistoryDetail(${idx})">📖 詳情</span>
                </div>
            `;
        });
        list.innerHTML = html;
    }

    function viewHistoryDetail(index) {
        const history = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
        const item = history[index];
        if (!item) return;
        let detail = `📋 練習詳情\n`;
        detail += `📅 日期: ${new Date(item.date).toLocaleString()}\n`;
        detail += `📝 句子: ${item.sentence || '(無)'}\n`;
        detail += `⭐ 評分: ${item.score || '-'}/10\n`;
        if (item.feedback) { detail += `💬 反饋: ${item.feedback}\n`; }
        alert(detail);
    }
